<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>🚀 NORTHSTAR PREMARKET RADAR</title>
  <style>
    :root{
      --bg:#0b1220;
      --panel:#121a2b;
      --text:#e7edf7;
      --muted:#95a3ba;
      --green:#22c55e;
      --yellow:#facc15;
      --red:#ef4444;
      --border:#24314a;
      --gold:#fbbf24;
      --line:#31415f;
      --blue:#38bdf8;
    }

    *{box-sizing:border-box}

    body{
      margin:0;
      padding:18px 14px 28px;
      background:linear-gradient(180deg,#09111d 0%, #0b1220 100%);
      color:var(--text);
      font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text","Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    }

    .wrap{
      max-width:760px;
      margin:0 auto;
    }

    .card{
      background:rgba(18,26,43,.96);
      border:1px solid var(--border);
      border-radius:18px;
      padding:16px 14px 18px;
      box-shadow:0 10px 30px rgba(0,0,0,.28);
    }

    .title{
      text-align:center;
      font-weight:800;
      font-size:20px;
      letter-spacing:.3px;
      margin:2px 0 10px;
    }

    .divider{
      height:1px;
      background:linear-gradient(90deg,transparent, var(--line) 15%, var(--line) 85%, transparent);
      margin:8px 0 14px;
    }

    .actions{
      display:flex;
      gap:10px;
      justify-content:center;
      flex-wrap:wrap;
      margin-bottom:14px;
    }

    button{
      appearance:none;
      border:none;
      border-radius:12px;
      padding:12px 16px;
      font-size:15px;
      font-weight:800;
      color:#06101b;
      background:linear-gradient(180deg,#7dd3fc,#38bdf8);
      box-shadow:0 6px 16px rgba(56,189,248,.22);
      cursor:pointer;
    }

    button:disabled{
      opacity:.6;
      cursor:not-allowed;
    }

    .status{
      text-align:center;
      color:var(--muted);
      font-size:13px;
      min-height:18px;
      margin-bottom:10px;
      line-height:1.45;
    }

    .section-title{
      color:#cdd8ea;
      font-weight:800;
      font-size:14px;
      letter-spacing:.6px;
      margin:18px 0 10px;
      text-transform:uppercase;
    }

    .market-box{
      border-radius:16px;
      padding:14px 12px;
      margin-bottom:16px;
      border:1px solid var(--border);
      text-align:center;
      font-weight:900;
    }

    .market-box.dead{
      background:linear-gradient(180deg,rgba(239,68,68,.10),rgba(239,68,68,.04));
      border-color:rgba(239,68,68,.30);
      color:#fecaca;
    }

    .market-box.weak{
      background:linear-gradient(180deg,rgba(250,204,21,.10),rgba(250,204,21,.04));
      border-color:rgba(250,204,21,.30);
      color:#fde68a;
    }

    .market-box.live{
      background:linear-gradient(180deg,rgba(34,197,94,.10),rgba(34,197,94,.04));
      border-color:rgba(34,197,94,.30);
      color:#bbf7d0;
    }

    .market-main{
      font-size:19px;
      margin-bottom:6px;
      letter-spacing:.3px;
    }

    .market-sub{
      font-size:13px;
      font-weight:700;
      color:#dbe7f5;
      opacity:.9;
    }

    .king-box{
      background:linear-gradient(180deg,rgba(251,191,36,.08),rgba(251,191,36,.03));
      border:1px solid rgba(251,191,36,.28);
      border-radius:16px;
      padding:12px;
      margin-bottom:18px;
    }

    .king-title{
      text-align:center;
      font-weight:900;
      color:var(--gold);
      margin-bottom:12px;
      font-size:16px;
    }

    .row{
      display:grid;
      grid-template-columns:92px 1fr auto;
      gap:10px;
      align-items:center;
      padding:10px 8px;
      border-radius:12px;
      background:rgba(255,255,255,.02);
      margin-bottom:10px;
    }

    .row:last-child{ margin-bottom:0; }

    .ticker{
      font-weight:900;
      font-size:17px;
      letter-spacing:.3px;
    }

    .middle{
      min-width:0;
    }

    .signal{
      font-size:17px;
      font-weight:900;
      white-space:nowrap;
    }

    .meta{
      font-size:12px;
      color:#d7e1f0;
      line-height:1.5;
      margin-top:2px;
    }

    .summary{
      color:#d7e1f0;
      font-size:13px;
      line-height:1.6;
      margin-top:10px;
      text-align:center;
    }

    .footnote{
      margin-top:14px;
      color:var(--muted);
      font-size:12px;
      text-align:center;
      line-height:1.5;
    }

    .hint{
      margin-top:12px;
      color:var(--muted);
      font-size:12px;
      text-align:center;
    }

    .pill{
      display:inline-block;
      padding:4px 8px;
      border-radius:999px;
      font-size:11px;
      font-weight:800;
      margin:0 4px 4px 0;
      border:1px solid var(--border);
      color:#dce7f5;
      background:rgba(255,255,255,.03);
    }

    .pill.green{ color:#bbf7d0; border-color:rgba(34,197,94,.30); }
    .pill.yellow{ color:#fde68a; border-color:rgba(250,204,21,.30); }
    .pill.red{ color:#fecaca; border-color:rgba(239,68,68,.30); }

    @media (max-width:480px){
      .row{
        grid-template-columns:78px 1fr;
      }
      .signal{
        grid-column: 1 / -1;
        justify-self:end;
        margin-top:-2px;
      }
      .ticker{font-size:16px}
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <div class="title">🚀 NORTHSTAR PREMARKET RADAR</div>
      <div class="divider"></div>

      <div class="actions">
        <button id="scanBtn" onclick="scanMarket()">SCAN MARKET</button>
      </div>

      <div id="status" class="status">Prêt pour le scan réel.</div>
      <div id="output"></div>
      <div class="hint">Radar iPhone propre : EMA200 slope + EMA9/20 + cross up frais bonus.</div>
    </div>
  </div>

  <script>
    // =============================
    // CONFIG
    // =============================
    const API_KEY = "u1ujNxMOWm5fGfePMeOdrn3teLy8fzNW";

    const UNIVERSE = [
      "AAPL","AMD","AMZN","AVGO","BABA","COIN","CVX","GOOGL","META","MRVL",
      "MU","NFLX","NVDA","PLTR","QCOM","SMCI","TSLA","UBER","XOM","JPM"
    ];

    const MARKET_SYMBOLS = ["SPY","QQQ"];

    const SETTINGS = {
      ema200SlopeLookback: 10,
      ema200SlopeLongMin: 0.5,
      ema200SlopeFlatMax: 0.5,
      rsiMin: 50,
      rsiMax: 82,
      minPrice: 5,
      minVolume: 300000,
      minRelVol: 1.1,
      freshCrossLookbackBars: 1,
      topCandidates: 3,
      topWatch: 3
    };

    // =============================
    // HELPERS
    // =============================
    function fmt1(n){ return Number.isFinite(n) ? n.toFixed(1) : "—"; }
    function fmt2(n){ return Number.isFinite(n) ? n.toFixed(2) : "—"; }
    function absPct(n){ return Number.isFinite(n) ? Math.abs(n) : 0; }

    function delay(ms){
      return new Promise(resolve => setTimeout(resolve, ms));
    }

    function clamp(v, min, max){
      return Math.max(min, Math.min(max, v));
    }

    function sanitizeTicker(symbol){
      const s = String(symbol || "").trim().toUpperCase();
      if (!s) return "";
      return s.startsWith("$") ? s.slice(1) : s;
    }

    async function fetchJson(url){
      const res = await fetch(url);
      if (!res.ok) {
        throw new Error(`HTTP ${res.status} sur ${url}`);
      }
      return res.json();
    }

    // =============================
    // API
    // =============================
    async function fetchQuote(symbol){
      const clean = sanitizeTicker(symbol);
      const url = `https://financialmodelingprep.com/stable/quote?symbol=${encodeURIComponent(clean)}&apikey=${API_KEY}`;
      const data = await fetchJson(url);
      return Array.isArray(data) ? data[0] : null;
    }

    async function fetchDailyHistory(symbol){
      const clean = sanitizeTicker(symbol);
      const url = `https://financialmodelingprep.com/stable/historical-price-eod/full?symbol=${encodeURIComponent(clean)}&apikey=${API_KEY}`;
      const data = await fetchJson(url);

      // Supporte plusieurs formats possibles
      let rows = [];
      if (Array.isArray(data)) rows = data;
      else if (Array.isArray(data?.historical)) rows = data.historical;
      else if (Array.isArray(data?.prices)) rows = data.prices;

      return rows
        .map(r => ({
          date: r.date || r.label || "",
          close: Number(r.close ?? r.adjClose ?? NaN),
          volume: Number(r.volume ?? 0)
        }))
        .filter(r => Number.isFinite(r.close))
        .sort((a, b) => String(a.date).localeCompare(String(b.date)));
    }

    async function fetchSymbolBundle(symbol){
      const clean = sanitizeTicker(symbol);
      const [quote, history] = await Promise.all([
        fetchQuote(clean),
        fetchDailyHistory(clean)
      ]);
      return { symbol: clean, quote, history };
    }

    async function fetchMany(symbols){
      const out = [];
      for (const symbol of symbols) {
        try {
          const item = await fetchSymbolBundle(symbol);
          out.push(item);
        } catch (err) {
          console.warn("Erreur symbole", symbol, err);
        }
        await delay(120);
      }
      return out;
    }

    // =============================
    // TECHNICALS
    // =============================
    function ema(values, period){
      if (!Array.isArray(values) || values.length < period) return [];
      const k = 2 / (period + 1);
      const out = [];

      let sma = 0;
      for (let i = 0; i < period; i++) sma += values[i];
      sma /= period;
      out[period - 1] = sma;

      for (let i = period; i < values.length; i++) {
        out[i] = values[i] * k + out[i - 1] * (1 - k);
      }

      return out;
    }

    function rsi(values, period = 14){
      if (!Array.isArray(values) || values.length < period + 1) return [];
      const out = Array(values.length).fill(undefined);

      let gains = 0;
      let losses = 0;

      for (let i = 1; i <= period; i++) {
        const diff = values[i] - values[i - 1];
        if (diff >= 0) gains += diff;
        else losses += Math.abs(diff);
      }

      let avgGain = gains / period;
      let avgLoss = losses / period;
      out[period] = avgLoss === 0 ? 100 : 100 - (100 / (1 + avgGain / avgLoss));

      for (let i = period + 1; i < values.length; i++) {
        const diff = values[i] - values[i - 1];
        const gain = diff > 0 ? diff : 0;
        const loss = diff < 0 ? Math.abs(diff) : 0;

        avgGain = ((avgGain * (period - 1)) + gain) / period;
        avgLoss = ((avgLoss * (period - 1)) + loss) / period;

        out[i] = avgLoss === 0 ? 100 : 100 - (100 / (1 + avgGain / avgLoss));
      }

      return out;
    }

    function lastDefined(arr){
      for (let i = arr.length - 1; i >= 0; i--) {
        if (Number.isFinite(arr[i])) return arr[i];
      }
      return NaN;
    }

    function getAtFromEnd(arr, offset){
      let found = 0;
      for (let i = arr.length - 1; i >= 0; i--) {
        if (Number.isFinite(arr[i])) {
          if (found === offset) return arr[i];
          found++;
        }
      }
      return NaN;
    }

    // =============================
    // NORMALIZE + SCORE
    // =============================
    function normalizeQuote(raw){
      if (!raw) return null;
      return {
        symbol: sanitizeTicker(raw.symbol || ""),
        price: Number(raw.price ?? NaN),
        previousClose: Number(raw.previousClose ?? NaN),
        changePct: Number(raw.changesPercentage ?? raw.changePercentage ?? raw.changePercent ?? NaN),
        volume: Number(raw.volume ?? 0),
        open: Number(raw.open ?? NaN)
      };
    }

    function computeGapPct(row){
      if (Number.isFinite(row.changePct)) return row.changePct;
      if (Number.isFinite(row.price) && Number.isFinite(row.previousClose) && row.previousClose !== 0) {
        return ((row.price - row.previousClose) / row.previousClose) * 100;
      }
      return 0;
    }

    function computeIndicators(bundle){
      const quote = normalizeQuote(bundle.quote);
      const history = Array.isArray(bundle.history) ? bundle.history : [];

      if (!quote || history.length < 50) return null;

      const closes = history.map(r => r.close);
      const volumes = history.map(r => Number(r.volume ?? 0));

      const ema9 = ema(closes, 9);
      const ema20 = ema(closes, 20);
      const ema200 = ema(closes, 200);
      const rsi14 = rsi(closes, 14);

      const ema9Now = lastDefined(ema9);
      const ema20Now = lastDefined(ema20);
      const ema200Now = lastDefined(ema200);
      const ema9Prev = getAtFromEnd(ema9, 1);
      const ema20Prev = getAtFromEnd(ema20, 1);
      const ema200PrevLookback = getAtFromEnd(ema200, SETTINGS.ema200SlopeLookback);

      const avgVol20 = volumes.slice(-20).reduce((a, b) => a + b, 0) / 20;
      const relVol = avgVol20 > 0 ? quote.volume / avgVol20 : 0;

      const slopePct = Number.isFinite(ema200Now) && Number.isFinite(ema200PrevLookback) && ema200PrevLookback !== 0
        ? ((ema200Now - ema200PrevLookback) / ema200PrevLookback) * 100
        : NaN;

      const ema9AboveEma20 = Number.isFinite(ema9Now) && Number.isFinite(ema20Now) ? ema9Now > ema20Now : false;
      const ema9CrossUpFresh = Number.isFinite(ema9Prev) && Number.isFinite(ema20Prev) && Number.isFinite(ema9Now) && Number.isFinite(ema20Now)
        ? (ema9Prev <= ema20Prev && ema9Now > ema20Now)
        : false;

      const rsiNow = lastDefined(rsi14);
      const gapPct = computeGapPct(quote);

      return {
        symbol: quote.symbol,
        price: quote.price,
        previousClose: quote.previousClose,
        gapPct,
        volume: quote.volume,
        avgVol20,
        relVol,
        ema9: ema9Now,
        ema20: ema20Now,
        ema200: ema200Now,
        ema200SlopePct: slopePct,
        ema9AboveEma20,
        ema9CrossUpFresh,
        rsi14: rsiNow
      };
    }

    function slopeStrength(slope){
      if (!Number.isFinite(slope)) return "N/A";
      if (Math.abs(slope) < SETTINGS.ema200SlopeFlatMax) return "⚪ FLAT";
      if (Math.abs(slope) < 0.8) return "🟡 SLOW";
      if (Math.abs(slope) < 1.5) return "🟢 CLEAN";
      return "🔥 STRONG";
    }

    function marketStatusFromContext(spyGap, qqqGap){
      const avg = ((spyGap || 0) + (qqqGap || 0)) / 2;
      if (avg <= -0.6) return { key:"dead", icon:"🔴", text:"MARKET DEAD", sub:"Pré-market faible ou négatif." };
      if (avg < 0.4) return { key:"weak", icon:"🟡", text:"MARKET SLOW", sub:"Contexte mitigé, prudence." };
      return { key:"live", icon:"🟢", text:"MARKET LIVE", sub:"Contexte plutôt favorable." };
    }

    function passesBaseFilter(row){
      return Number.isFinite(row.price) &&
             row.price >= SETTINGS.minPrice &&
             row.volume >= SETTINGS.minVolume;
    }

    function scoreRow(row){
      let score = 0;

      if (row.ema200SlopePct > SETTINGS.ema200SlopeLongMin) score += 30;
      else if (row.ema200SlopePct > 0) score += 15;

      if (row.ema9AboveEma20) score += 25;
      if (row.ema9CrossUpFresh) score += 15;

      if (row.relVol >= 2) score += 15;
      else if (row.relVol >= SETTINGS.minRelVol) score += 10;

      if (row.rsi14 >= SETTINGS.rsiMin && row.rsi14 <= SETTINGS.rsiMax) score += 10;

      if (absPct(row.gapPct) >= 2) score += 5;

      return clamp(score, 0, 100);
    }

    function classifyRow(row){
      const slopeTxt = slopeStrength(row.ema200SlopePct);
      const score = scoreRow(row);

      const go =
        row.ema200SlopePct > SETTINGS.ema200SlopeLongMin &&
        row.ema9AboveEma20 &&
        row.relVol >= SETTINGS.minRelVol &&
        row.rsi14 >= SETTINGS.rsiMin &&
        row.rsi14 <= SETTINGS.rsiMax;

      const watch =
        row.ema200SlopePct > 0 &&
        row.ema9AboveEma20;

      let actionSignal = "🔴 NO";
      if (go && score >= 70) actionSignal = "🟢 GO";
      else if (watch && score >= 50) actionSignal = "🟡 WATCH";

      return {
        ...row,
        slopeTxt,
        score,
        actionSignal
      };
    }

    function summarizeRow(row){
      const parts = [
        `Slope ${fmt2(row.ema200SlopePct)}%`,
        `9>20 ${row.ema9AboveEma20 ? "YES" : "NO"}`,
        `Cross ${row.ema9CrossUpFresh ? "YES" : "NO"}`,
        `RelVol ${fmt1(row.relVol)}x`,
        `RSI ${fmt1(row.rsi14)}`
      ];
      return parts.join(" | ");
    }

    function renderRow(row){
      return `
        <div class="row">
          <div class="ticker">${row.symbol}</div>
          <div class="middle">
            <div class="meta">${summarizeRow(row)}</div>
            <div class="meta">
              <span class="pill ${row.ema200SlopePct > SETTINGS.ema200SlopeLongMin ? "green" : (Math.abs(row.ema200SlopePct) < SETTINGS.ema200SlopeFlatMax ? "red" : "yellow")}">${row.slopeTxt}</span>
              <span class="pill ${row.ema9AboveEma20 ? "green" : "red"}">EMA9>${row.ema9AboveEma20 ? "EMA20" : "NON"}</span>
              <span class="pill ${row.ema9CrossUpFresh ? "green" : "yellow"}">CROSS ${row.ema9CrossUpFresh ? "FRESH" : "OLD"}</span>
              <span class="pill">${row.score}/100</span>
            </div>
          </div>
          <div class="signal">${row.actionSignal}</div>
        </div>
      `;
    }

    function renderOutput(rows, market){
      const output = document.getElementById("output");

      const goRows = rows.filter(r => r.actionSignal === "🟢 GO").slice(0, SETTINGS.topCandidates);
      const watchRows = rows.filter(r => r.actionSignal === "🟡 WATCH").slice(0, SETTINGS.topWatch);
      const king = goRows[0] || watchRows[0] || null;

      const noTrade = goRows.length === 0 && watchRows.length === 0;

      output.innerHTML = `
        <div class="market-box ${market.key}">
          <div class="market-main">${market.icon} ${market.text}</div>
          <div class="market-sub">${market.sub}</div>
        </div>

        ${
          king
            ? `
              <div class="king-box">
                <div class="king-title">👑 KING OF THE DAY 👑</div>
                ${renderRow(king)}
                <div class="summary">Le plus propre du radar en ce moment.</div>
              </div>
            `
            : `
              <div class="king-box">
                <div class="king-title">👑 KING OF THE DAY 👑</div>
                <div class="summary">Aucun vrai KING ce matin. Pas assez propre pour chasser.</div>
              </div>
            `
        }

        ${
          noTrade
            ? `
              <div class="section-title">NO TRADE DAY</div>
              <div class="summary">
                Aucun ticker ne respecte en même temps la pente EMA200,
                EMA9 au-dessus EMA20, et un volume assez vivant.
              </div>
            `
            : ""
        }

        ${
          goRows.length
            ? `<div class="section-title">TOP CANDIDATS</div>${goRows.map(renderRow).join("")}`
            : ""
        }

        ${
          watchRows.length
            ? `<div class="section-title">WATCH</div>${watchRows.map(renderRow).join("")}`
            : ""
        }

        <div class="footnote">
          Filtre principal = EMA200 slope positive + EMA9 au-dessus EMA20 + cross up frais en bonus + volume + RSI.
        </div>
      `;
    }

    // =============================
    // MAIN
    // =============================
    async function scanMarket(){
      const btn = document.getElementById("scanBtn");
      const status = document.getElementById("status");
      const output = document.getElementById("output");

      btn.disabled = true;
      status.textContent = "Scan réel en cours...";
      output.innerHTML = "";

      try {
       if (!API_KEY || API_KEY.trim() === "") {
  throw new Error("Ajoute d’abord ta clé API FMP dans la constante API_KEY.");
}

        const bundles = await fetchMany([...MARKET_SYMBOLS, ...UNIVERSE]);

        const rows = bundles
          .map(computeIndicators)
          .filter(Boolean)
          .filter(passesBaseFilter)
          .map(classifyRow)
          .sort((a, b) => b.score - a.score);

        const spy = rows.find(r => r.symbol === "SPY");
        const qqq = rows.find(r => r.symbol === "QQQ");
        const market = marketStatusFromContext(spy?.gapPct ?? 0, qqq?.gapPct ?? 0);

        const stockRows = rows.filter(r => !MARKET_SYMBOLS.includes(r.symbol));

        renderOutput(stockRows, market);
        status.textContent = `Scan terminé : ${stockRows.length} titres exploitables.`;
      } catch (err) {
        console.error(err);
        status.textContent = "Erreur pendant le scan.";
        output.innerHTML = `
          <div class="footnote" style="color:#fca5a5;">
            ${String(err.message || err)}
          </div>
        `;
      } finally {
        btn.disabled = false;
      }
    }
  </script>
</body>
</html>
