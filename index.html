<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>🚀 NORTHSTAR PREMARKET RADAR V2</title>
  <style>
    :root{
      --bg:#0b1220;
      --panel:#121a2b;
      --panel2:#182338;
      --text:#e7edf7;
      --muted:#95a3ba;
      --green:#22c55e;
      --yellow:#facc15;
      --orange:#fb923c;
      --red:#ef4444;
      --blue:#38bdf8;
      --gold:#fbbf24;
      --border:#24314a;
      --line:#31415f;
      --cardShadow:0 10px 30px rgba(0,0,0,.28);
    }

    *{box-sizing:border-box}

    body{
      margin:0;
      padding:18px 14px 28px;
      background:linear-gradient(180deg,#09111d 0%, #0b1220 100%);
      color:var(--text);
      font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text","Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    }

    .wrap{
      max-width:860px;
      margin:0 auto;
    }

    .card{
      background:rgba(18,26,43,.96);
      border:1px solid var(--border);
      border-radius:18px;
      padding:16px 14px 18px;
      box-shadow:var(--cardShadow);
    }

    .title{
      text-align:center;
      font-weight:900;
      font-size:20px;
      letter-spacing:.3px;
      margin:2px 0 10px;
    }

    .subtitle{
      text-align:center;
      color:var(--muted);
      font-size:12px;
      margin-top:-4px;
      margin-bottom:8px;
    }

    .divider{
      height:1px;
      background:linear-gradient(90deg,transparent, var(--line) 15%, var(--line) 85%, transparent);
      margin:8px 0 14px;
    }

    .actions{
      display:flex;
      gap:10px;
      justify-content:center;
      flex-wrap:wrap;
      margin-bottom:12px;
    }

    button{
      appearance:none;
      border:none;
      border-radius:12px;
      padding:12px 16px;
      font-size:15px;
      font-weight:800;
      color:#06101b;
      background:linear-gradient(180deg,#7dd3fc,#38bdf8);
      box-shadow:0 6px 16px rgba(56,189,248,.22);
      cursor:pointer;
    }

    button.secondary{
      color:var(--text);
      background:linear-gradient(180deg,#1f2d47,#172233);
      border:1px solid var(--border);
      box-shadow:none;
    }

    button.activeMode{
      background:linear-gradient(180deg,#fde68a,#fbbf24);
      color:#2a1900;
      box-shadow:0 6px 16px rgba(251,191,36,.18);
    }

    button:disabled{
      opacity:.6;
      cursor:not-allowed;
    }

    .status{
      text-align:center;
      color:var(--muted);
      font-size:13px;
      min-height:18px;
      margin-bottom:10px;
      line-height:1.4;
    }

    .section-title{
      color:#cdd8ea;
      font-weight:900;
      font-size:14px;
      letter-spacing:.7px;
      margin:18px 0 10px;
      text-transform:uppercase;
    }

    .king-box{
      background:linear-gradient(180deg,rgba(251,191,36,.10),rgba(251,191,36,.03));
      border:1px solid rgba(251,191,36,.30);
      border-radius:16px;
      padding:12px;
      margin-bottom:18px;
    }

    .king-title{
      text-align:center;
      font-weight:900;
      color:var(--gold);
      margin-bottom:12px;
      font-size:16px;
    }

    .list{
      display:flex;
      flex-direction:column;
      gap:8px;
    }

    .row{
      display:grid;
      grid-template-columns:80px 58px 1fr auto;
      gap:10px;
      align-items:center;
      padding:12px 10px;
      border-radius:14px;
      background:rgba(255,255,255,.02);
      border:1px solid rgba(255,255,255,.03);
    }

    .leftBlock{
      display:flex;
      flex-direction:column;
      gap:2px;
    }

    .ticker{
      font-weight:900;
      font-size:17px;
      letter-spacing:.3px;
    }

    .price{
      color:var(--muted);
      font-size:12px;
      font-weight:700;
    }

    .gradeBox{
      display:flex;
      align-items:center;
      justify-content:center;
      width:52px;
      height:42px;
      border-radius:12px;
      font-size:20px;
      font-weight:900;
      border:1px solid transparent;
    }

    .gradeA{
      background:rgba(34,197,94,.14);
      color:var(--green);
      border-color:rgba(34,197,94,.25);
    }

    .gradeB{
      background:rgba(250,204,21,.14);
      color:var(--yellow);
      border-color:rgba(250,204,21,.25);
    }

    .gradeC{
      background:rgba(251,146,60,.14);
      color:var(--orange);
      border-color:rgba(251,146,60,.25);
    }

    .gradeD{
      background:rgba(239,68,68,.14);
      color:var(--red);
      border-color:rgba(239,68,68,.25);
    }

    .middle{
      min-width:0;
    }

    .metrics{
      display:flex;
      gap:8px;
      flex-wrap:wrap;
      margin-bottom:4px;
    }

    .chip{
      font-size:11px;
      font-weight:800;
      color:#dce6f5;
      background:rgba(255,255,255,.05);
      border:1px solid rgba(255,255,255,.05);
      padding:5px 7px;
      border-radius:999px;
      white-space:nowrap;
    }

    .summary{
      color:#d7e1f0;
      font-size:12px;
      line-height:1.45;
    }

    .right{
      display:flex;
      flex-direction:column;
      align-items:flex-end;
      gap:8px;
    }

    .signal{
      font-size:16px;
      font-weight:900;
      white-space:nowrap;
    }

    .tvBtn{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      text-decoration:none;
      border-radius:10px;
      padding:8px 10px;
      font-size:12px;
      font-weight:900;
      color:#dff3ff;
      background:rgba(56,189,248,.12);
      border:1px solid rgba(56,189,248,.24);
      min-width:92px;
    }

    .market-context{
      margin-top:20px;
      display:flex;
      align-items:center;
      justify-content:center;
      gap:10px;
      color:#d8e1ef;
      font-weight:900;
      font-size:15px;
      letter-spacing:.3px;
    }

    .market-context::before,
    .market-context::after{
      content:"";
      flex:1;
      height:1px;
      background:var(--line);
    }

    .context-green{ color:var(--green); }
    .context-yellow{ color:var(--yellow); }
    .context-red{ color:var(--red); }

    .modeInfo{
      text-align:center;
      color:var(--muted);
      font-size:12px;
      margin-bottom:8px;
    }

    .footnote{
      margin-top:14px;
      color:var(--muted);
      font-size:12px;
      text-align:center;
      line-height:1.5;
    }

    .hint{
      margin-top:12px;
      color:var(--muted);
      font-size:12px;
      text-align:center;
    }

    .emptyBox{
      background:rgba(255,255,255,.02);
      border:1px solid rgba(255,255,255,.03);
      border-radius:14px;
      padding:14px;
      color:var(--muted);
      text-align:center;
      font-size:13px;
    }

    @media (max-width:600px){
      .row{
        grid-template-columns:72px 54px 1fr;
      }
      .right{
        grid-column:1 / -1;
        flex-direction:row;
        justify-content:space-between;
        align-items:center;
      }
      .ticker{font-size:16px}
      .summary{font-size:11px}
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <div class="title">🚀 NORTHSTAR PREMARKET RADAR V2</div>
      <div class="subtitle">Scanner iPhone aligné avec la logique du BUNKER</div>
      <div class="divider"></div>

      <div class="actions">
        <button id="scanBtn" onclick="scanMarket()">SCAN MARKET</button>
      </div>

      <div class="actions">
        <button id="modeSolid" class="secondary activeMode" onclick="setMode('SOLID')">MODE SOLIDE</button>
        <button id="modeExplosive" class="secondary" onclick="setMode('EXPLOSIVE')">MODE EXPLOSIF</button>
      </div>

      <div id="modeInfo" class="modeInfo">Univers actuel : SOLIDE</div>
      <div id="status" class="status">Prêt pour le scan réel.</div>
      <div id="output"></div>
      <div class="hint">Scanner prêt. Ajuste les univers SOLIDE ou EXPLOSIF directement dans le script.</div>

  <script>
    // =============================
    // CONFIG
    // =============================
    const API_KEY = "u1ujNxMOWm5fGfePMeOdrn3teLy8fzNW";
    const UNIVERSE_SOLID = [
      "AAPL","AMD","AMZN","AVGO","BABA","COIN","CVX","GOOGL","META","MRVL",
      "MU","NFLX","NVDA","PLTR","QCOM","SMCI","TSLA","UBER","XOM","JPM"
    ];

    const UNIVERSE_EXPLOSIVE = [
      "ACHR","ASTS","BBAI","BITF","BTBT","CELH","CHPT","CIFR","CLSK","CORZ",
      "ENVX","FUBO","HIMS","IONQ","IREN","JOBY","LCID","LUNR","MARA","MVIS",
      "NBIS","OPEN","PLTR","QS","RIOT","RIVN","RKLB","RUN","SOUN","SOFI",
      "UPST","WULF","AAOI","AFRM","ARRY"
    ];

    const MARKET_SYMBOLS = ["SPY","QQQ"];

    const SECTOR_MAP = {
      NVDA:"SEMI", AMD:"SEMI", AVGO:"SEMI", MRVL:"SEMI", MU:"SEMI", QCOM:"SEMI", AAOI:"SEMI",
      TSLA:"EV", RIVN:"EV", LCID:"EV",
      UBER:"TRANSPORT",
      XOM:"ENERGY", CVX:"ENERGY", RUN:"ENERGY", ARRY:"ENERGY",
      META:"TECH", GOOGL:"TECH", AAPL:"TECH", AMZN:"TECH", NFLX:"TECH",
      PLTR:"AI", SMCI:"AI", BBAI:"AI", SOUN:"AI",
      COIN:"CRYPTO", MARA:"CRYPTO", RIOT:"CRYPTO", CIFR:"CRYPTO", CLSK:"CRYPTO", BITF:"CRYPTO", BTBT:"CRYPTO", IREN:"CRYPTO", WULF:"CRYPTO", CORZ:"CRYPTO",
      JPM:"BANKS", AFRM:"FINTECH", SOFI:"FINTECH", UPST:"FINTECH",
      RKLB:"SPACE", LUNR:"SPACE", ASTS:"SPACE", JOBY:"AERO", ACHR:"AERO",
      CHPT:"CHARGE", OPEN:"REALTY", FUBO:"MEDIA", HIMS:"HEALTH", ENVX:"BATTERY", QS:"BATTERY", CELH:"CONSUMER", BABA:"CHINA", NBIS:"TECH", MVIS:"TECH"
    };

    let currentMode = "SOLID";

    // =============================
    // HELPERS
    // =============================
    function fmt1(n){ return Number.isFinite(n) ? n.toFixed(1) : "—"; }
    function fmt2(n){ return Number.isFinite(n) ? n.toFixed(2) : "—"; }
    function absPct(n){ return Number.isFinite(n) ? Math.abs(n) : 0; }

    function delay(ms){
      return new Promise(resolve => setTimeout(resolve, ms));
    }

    async function fetchJson(url){
      const res = await fetch(url);
      if (!res.ok) throw new Error(`HTTP ${res.status} sur ${url}`);
      return res.json();
    }

    function getUniverse(){
      return currentMode === "EXPLOSIVE" ? UNIVERSE_EXPLOSIVE : UNIVERSE_SOLID;
    }

    function setMode(mode){
      currentMode = mode;
      document.getElementById("modeSolid").classList.toggle("activeMode", mode === "SOLID");
      document.getElementById("modeExplosive").classList.toggle("activeMode", mode === "EXPLOSIVE");
      document.getElementById("modeInfo").textContent = `Univers actuel : ${mode === "SOLID" ? "SOLIDE" : "EXPLOSIF"}`;
    }

    function tradingViewUrl(symbol){
      const clean = encodeURIComponent(symbol);
      return `https://www.tradingview.com/chart/?symbol=${clean}`;
    }

    // =============================
    // API
    // =============================
    async function fetchQuote(symbol){
      const url = `https://financialmodelingprep.com/stable/quote?symbol=${encodeURIComponent(symbol)}&apikey=${API_KEY}`;
      const data = await fetchJson(url);
      return Array.isArray(data) ? data[0] : null;
    }

    async function fetchAllQuotes(symbols){
      const out = [];
      for (const symbol of symbols) {
        try {
          const q = await fetchQuote(symbol);
          if (q) out.push(q);
        } catch (err) {
          console.warn("Erreur quote", symbol, err);
        }
        await delay(120);
      }
      return out;
    }

    // =============================
    // NORMALIZATION
    // =============================
    function normalizeQuote(raw){
      if (!raw) return null;

      return {
        symbol: raw.symbol || "",
        price: Number(raw.price ?? NaN),
        previousClose: Number(raw.previousClose ?? NaN),
        changePct: Number(raw.changesPercentage ?? raw.changePercentage ?? raw.changePercent ?? 0),
        volume: Number(raw.volume ?? 0),
        dayLow: Number(raw.dayLow ?? NaN),
        dayHigh: Number(raw.dayHigh ?? NaN),
        open: Number(raw.open ?? NaN)
      };
    }

    // =============================
    // CALCULS
    // =============================
    function computeGapPct(row){
      if (Number.isFinite(row.changePct)) return row.changePct;
      if (Number.isFinite(row.price) && Number.isFinite(row.previousClose) && row.previousClose !== 0) {
        return ((row.price - row.previousClose) / row.previousClose) * 100;
      }
      return 0;
    }

    function computeVolRel(row){
      if (!Number.isFinite(row.volume)) return 0;

      if (row.volume >= 20000000) return 3.0;
      if (row.volume >= 10000000) return 2.5;
      if (row.volume >= 5000000)  return 2.0;
      if (row.volume >= 2000000)  return 1.6;
      if (row.volume >= 800000)   return 1.3;
      return 0.8;
    }

    function computeFloatPct(row){
      if (!Number.isFinite(row.volume) || row.volume <= 0) return 0;
      if (row.volume >= 20000000) return 8.0;
      if (row.volume >= 10000000) return 5.5;
      if (row.volume >= 5000000)  return 3.8;
      if (row.volume >= 2000000)  return 2.4;
      if (row.volume >= 800000)   return 1.4;
      return 0.6;
    }

    function computeHold(row){
      if (!Number.isFinite(row.price) || !Number.isFinite(row.dayLow) || !Number.isFinite(row.dayHigh)) return false;
      const range = row.dayHigh - row.dayLow;
      if (range <= 0) return false;
      const pos = (row.price - row.dayLow) / range;
      return pos >= 0.50;
    }

    function computeCompression(row){
      if (!Number.isFinite(row.dayLow) || !Number.isFinite(row.dayHigh) || !Number.isFinite(row.price)) return false;
      const rangePct = ((row.dayHigh - row.dayLow) / row.price) * 100;
      return rangePct <= 2.0;
    }

    function computeResistanceRoom(row){
      if (!Number.isFinite(row.price) || !Number.isFinite(row.dayHigh) || row.price <= 0) return false;
      const distHighPct = ((row.dayHigh - row.price) / row.price) * 100;
      return distHighPct >= 0.6;
    }

    function computeMomentumAlive(gapPct, volRel){
      return absPct(gapPct) >= 2 && volRel >= 1.3;
    }

    function hasInstitutionalVolume(volRel, hold, compression){
      return volRel >= 2.0 && hold && (compression || volRel >= 2.5);
    }

    function computeActionSignal(grade){
  if (grade === "A") return "🟢 ENTRÉE";
  if (grade === "B") return "🟡 À SURVEILLER";
  if (grade === "C") return "🟠 OBSERVATION";
  return "🔴 IGNORER";
}
    }

    function computeGrade(score){
      if (score >= 7) return "A";
      if (score >= 5) return "B";
      if (score >= 3) return "C";
      return "D";
    }

    function gradeClass(grade){
      return `grade${grade}`;
    }

    function passesLiquidityFilter(row){
      if (currentMode === "EXPLOSIVE") {
        return row.price >= 2 && row.price <= 25 && row.volume >= 300000;
      }
      return row.price >= 5 && row.volume >= 300000;
    }

    function enrichRow(row){
      const gapPct = computeGapPct(row);
      const volRel = computeVolRel(row);
      const floatPct = computeFloatPct(row);
      const hold = computeHold(row);
      const compression = computeCompression(row);
      const room = computeResistanceRoom(row);
      const momentumAlive = computeMomentumAlive(gapPct, volRel);
      const institutional = hasInstitutionalVolume(volRel, hold, compression);

      let score = 0;
      if (absPct(gapPct) >= 3) score += 1;
      if (volRel >= 1.5) score += 1;
      if (hold) score += 1;
      if (compression) score += 1;
      if (momentumAlive) score += 1;
      if (institutional) score += 1;
      if (room) score += 1;

      if (currentMode === "EXPLOSIVE" && row.price >= 2 && row.price <= 20) score += 1;
      if (currentMode === "SOLID" && row.price >= 20) score += 1;

      score = Math.max(0, Math.min(8, score));

      const grade = computeGrade(score);
      const actionSignal = computeActionSignal(grade);

      return {
        ...row,
        gapPct,
        volRel,
        floatPct,
        hold,
        compression,
        room,
        momentumAlive,
        institutional,
        score,
        grade,
        actionSignal,
        sector: SECTOR_MAP[row.symbol] || "GENERAL"
      };
    }

    function assignSectorLeaders(rows){
      const bestBySector = new Map();

      for (const row of rows) {
        const power =
          row.score * 10 +
          row.volRel * 4 +
          absPct(row.gapPct) +
          (row.institutional ? 4 : 0);

        if (!bestBySector.has(row.sector) || power > bestBySector.get(row.sector).power) {
          bestBySector.set(row.sector, { symbol: row.symbol, power });
        }
      }

      return rows.map(row => ({
        ...row,
        isSectorLeader: bestBySector.get(row.sector)?.symbol === row.symbol
      }));
    }

    function chooseMarketContext(spyRow, qqqRow){
      const spy = Number(spyRow?.gapPct ?? 0);
      const qqq = Number(qqqRow?.gapPct ?? 0);

      if (spy > 0 && qqq > 0) {
        return { dot:"🟢", className:"context-green" };
      }
      if ((spy >= 0 && qqq < 0) || (spy < 0 && qqq >= 0) || (Math.abs(spy) < 0.3 && Math.abs(qqq) < 0.3)) {
        return { dot:"🟡", className:"context-yellow" };
      }
      return { dot:"🔴", className:"context-red" };
    }

    function chooseKing(rows){
      const eligible = rows.filter(r => r.grade === "A" || (r.grade === "B" && r.institutional));

      if (!eligible.length) return null;

      return [...eligible].sort((a, b) => {
        const scoreA =
          a.score * 10 +
          a.volRel * 4 +
          absPct(a.gapPct) +
          (a.institutional ? 4 : 0) +
          (a.isSectorLeader ? 3 : 0) +
          (a.hold ? 2 : 0);

        const scoreB =
          b.score * 10 +
          b.volRel * 4 +
          absPct(b.gapPct) +
          (b.institutional ? 4 : 0) +
          (b.isSectorLeader ? 3 : 0) +
          (b.hold ? 2 : 0);

        return scoreB - scoreA;
      })[0];
    }

    // =============================
    // RENDER
    // =============================
    function flagsForRow(row){
      const flags = [];
      if (row.institutional) flags.push("💰");
      if (row.isSectorLeader) flags.push("🏁");
      if (row.compression) flags.push("🧱");
      if (row.momentumAlive) flags.push("⚡");
      return flags.join(" ");
    }

    function summarizeRow(row){
      const parts = [
        `Gap ${fmt1(row.gapPct)}%`,
        `Vol ${fmt1(row.volRel)}x`,
        `Float ${fmt1(row.floatPct)}%`,
        row.hold ? "Tient bien" : "Tient mal",
        row.room ? "Espace OK" : "Résistance proche"
      ];
      return parts.join(" | ");
    }

    function renderRow(row){
      return `
        <div class="row">
          <div class="leftBlock">
            <div class="ticker">${row.symbol}</div>
            <div class="price">$${fmt2(row.price)}</div>
          </div>

          <div class="gradeBox ${gradeClass(row.grade)}">${row.grade}</div>

          <div class="middle">
            <div class="metrics">
              <span class="chip">Gap ${fmt1(row.gapPct)}%</span>
              <span class="chip">Vol ${fmt1(row.volRel)}x</span>
              <span class="chip">${flagsForRow(row) || "—"}</span>
            </div>
            <div class="summary">${summarizeRow(row)}</div>
          </div>

          <div class="right">
            <div class="signal">${row.actionSignal}</div>
            <a class="tvBtn" href="${tradingViewUrl(row.symbol)}" target="_blank" rel="noopener noreferrer">TradingView</a>
          </div>
        </div>
      `;
    }

    function renderRows(rows){
      return rows.map(renderRow).join("");
    }

    function renderOutput(rows, context){
      const output = document.getElementById("output");

      const king = chooseKing(rows);
      const rest = rows.filter(r => !king || r.symbol !== king.symbol);

      const topRows = rest.filter(r => r.grade === "A" || r.grade === "B");
      const watchRows = rest.filter(r => r.grade === "C");
      const ignoreRows = rest.filter(r => r.grade === "D").slice(0, 3);

      output.innerHTML = `
        ${
          king
            ? `
              <div class="king-box">
                <div class="king-title">👑 KING OF THE DAY 👑</div>
                ${renderRow(king)}
                <div class="summary" style="margin-top:10px;text-align:center;">${summarizeRow(king)}</div>
              </div>
            `
            : `
              <div class="king-box">
                <div class="king-title">👑 KING OF THE DAY 👑</div>
                <div class="summary" style="text-align:center;">Aucun setup fort détecté pour le moment. Marché calme ou indécis.</div>
              </div>
            `
        }

        ${
          topRows.length
            ? `<div class="section-title">TOP CANDIDATS</div><div class="list">${renderRows(topRows)}</div>`
            : `<div class="section-title">TOP CANDIDATS</div><div class="emptyBox">Aucun candidat fort pour l’instant.</div>`
        }

        ${
          watchRows.length
            ? `<div class="section-title">WATCH</div><div class="list">${renderRows(watchRows)}</div>`
            : ""
        }

        ${
          ignoreRows.length
            ? `<div class="section-title">IGNORE</div><div class="list">${renderRows(ignoreRows)}</div>`
            : ""
        }

        <div class="market-context">
          <span>Market <span class="${context.className}">${context.dot}</span> Context</span>
        </div>

        <div class="footnote">
          Note A/B/C/D = gap • volume • tenue • compression • momentum • qualité globale • espace devant
        </div>
      `;
    }

    // =============================
    // MAIN
    // =============================
    async function scanMarket(){
      const btn = document.getElementById("scanBtn");
      const status = document.getElementById("status");
      const output = document.getElementById("output");

      btn.disabled = true;
      status.textContent = "Scan réel en cours...";
      output.innerHTML = "";

      try {
       if (!API_KEY) {
  throw new Error("u1ujNxMOWm5fGfePMeOdrn3teLy8fzNW");
}

        const universe = getUniverse();

        const [marketRaw, rawQuotes] = await Promise.all([
          fetchAllQuotes(MARKET_SYMBOLS),
          fetchAllQuotes(universe)
        ]);

        const marketRows = marketRaw.map(normalizeQuote).filter(Boolean).map(enrichRow);
        let rows = rawQuotes.map(normalizeQuote).filter(Boolean).map(enrichRow);

        rows = rows.filter(passesLiquidityFilter);
        rows = assignSectorLeaders(rows);

        rows.sort((a, b) => {
          const powerA =
            a.score * 10 +
            a.volRel * 4 +
            absPct(a.gapPct) +
            (a.institutional ? 4 : 0) +
            (a.isSectorLeader ? 3 : 0);

          const powerB =
            b.score * 10 +
            b.volRel * 4 +
            absPct(b.gapPct) +
            (b.institutional ? 4 : 0) +
            (b.isSectorLeader ? 3 : 0);

          return powerB - powerA;
        });

        const spyRow = marketRows.find(r => r.symbol === "SPY");
        const qqqRow = marketRows.find(r => r.symbol === "QQQ");
        const context = chooseMarketContext(spyRow, qqqRow);

        renderOutput(rows, context);
        status.textContent = `Scan terminé : ${rows.length} titres retenus (${currentMode === "SOLID" ? "mode solide" : "mode explosif"}).`;
      } catch (err) {
        console.error(err);
        status.textContent = "Erreur pendant le scan.";
        output.innerHTML = `
          <div class="footnote" style="color:#fca5a5;">
            ${String(err.message || err)}
          </div>
        `;
      } finally {
        btn.disabled = false;
      }
    }

    setMode("SOLID");
    scanMarket();
  </script>
</body>
