<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>🚀 NORTHSTAR PREMARKET RADAR</title>
  <style>
    :root{
      --bg:#0b1220;
      --panel:#121a2b;
      --panel-2:#0f1726;
      --text:#e7edf7;
      --muted:#95a3ba;
      --green:#22c55e;
      --yellow:#facc15;
      --red:#ef4444;
      --blue:#60a5fa;
      --border:#24314a;
      --gold:#fbbf24;
    }

    *{box-sizing:border-box}

    body{
      margin:0;
      padding:18px 14px 28px;
      background:linear-gradient(180deg,#09111d 0%, #0b1220 100%);
      color:var(--text);
      font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text","Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    }

    .wrap{
      max-width:720px;
      margin:0 auto;
    }

    .card{
      background:rgba(18,26,43,.92);
      border:1px solid var(--border);
      border-radius:18px;
      padding:16px 14px 18px;
      box-shadow:0 10px 30px rgba(0,0,0,.28);
      backdrop-filter: blur(10px);
    }

    .title{
      text-align:center;
      font-weight:800;
      font-size:20px;
      letter-spacing:.3px;
      margin:2px 0 10px;
    }

    .divider{
      height:1px;
      background:linear-gradient(90deg,transparent, #31415f 15%, #31415f 85%, transparent);
      margin:8px 0 14px;
    }

    .actions{
      display:flex;
      gap:10px;
      justify-content:center;
      margin-bottom:14px;
      flex-wrap:wrap;
    }

    button{
      appearance:none;
      border:none;
      border-radius:12px;
      padding:12px 16px;
      font-size:15px;
      font-weight:800;
      color:#06101b;
      background:linear-gradient(180deg,#7dd3fc,#38bdf8);
      box-shadow:0 6px 16px rgba(56,189,248,.22);
    }

    button:active{
      transform:translateY(1px);
    }

    .status{
      text-align:center;
      color:var(--muted);
      font-size:13px;
      min-height:18px;
      margin-bottom:10px;
    }

    .section-title{
      color:#cdd8ea;
      font-weight:800;
      font-size:14px;
      letter-spacing:.6px;
      margin:18px 0 10px;
      text-transform:uppercase;
    }

    .king-box{
      background:linear-gradient(180deg,rgba(251,191,36,.08),rgba(251,191,36,.03));
      border:1px solid rgba(251,191,36,.28);
      border-radius:16px;
      padding:12px;
      margin-bottom:18px;
    }

    .king-title{
      text-align:center;
      font-weight:900;
      color:var(--gold);
      margin-bottom:12px;
      font-size:16px;
    }

    .row{
      display:grid;
      grid-template-columns:80px 1fr auto;
      align-items:center;
      gap:10px;
      padding:10px 6px;
      border-radius:12px;
      background:rgba(255,255,255,.02);
      margin-bottom:10px;
    }

    .row:last-child{
      margin-bottom:0;
    }

    .ticker{
      font-weight:900;
      font-size:17px;
      letter-spacing:.3px;
    }

    .score{
      font-size:18px;
      line-height:1;
      letter-spacing:1px;
      white-space:nowrap;
    }

    .flags{
      white-space:nowrap;
      font-size:18px;
      font-weight:800;
    }

    .summary{
      color:#d7e1f0;
      font-size:13px;
      line-height:1.55;
      margin-top:10px;
      text-align:center;
    }

    .list{
      display:flex;
      flex-direction:column;
      gap:8px;
    }

    .muted{
      color:var(--muted);
    }

.market-context{
  margin-top:20px;
  display:flex;
  align-items:center;
  justify-content:center;
  gap:10px;
  color:#d8e1ef;
  font-weight:800;
  font-size:15px;
  letter-spacing:.3px;
}

.market-context::before,
.market-context::after{
  content:"";
  flex:1;
  height:1px;
  background:#31415f;
}
    

    .context-green{ color:var(--green); }
    .context-yellow{ color:var(--yellow); }
    .context-red{ color:var(--red); }

    .tag{
      display:inline-block;
      padding:3px 8px;
      border-radius:999px;
      font-size:11px;
      font-weight:800;
      letter-spacing:.3px;
      margin-left:6px;
      vertical-align:middle;
      border:1px solid rgba(255,255,255,.08);
    }

    .tag-top{ background:rgba(34,197,94,.10); color:#86efac; }
    .tag-watch{ background:rgba(250,204,21,.10); color:#fde68a; }
    .tag-ignore{ background:rgba(239,68,68,.10); color:#fca5a5; }

    .footnote{
      margin-top:14px;
      color:var(--muted);
      font-size:12px;
      text-align:center;
      line-height:1.5;
    }

    @media (max-width:420px){
      .row{
        grid-template-columns:72px 1fr auto;
      }
      .ticker{font-size:16px}
      .score,.flags{font-size:17px}
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <div class="title">🚀 NORTHSTAR PREMARKET RADAR</div>
      <div class="divider"></div>

      <div class="actions">
        <button onclick="scanMarket()">SCAN MARKET</button>
      </div>

      <div id="status" class="status">Prêt pour le scan.</div>

      <div id="output"></div>
    </div>
  </div>

  <script>
    /******************************************************************
     * NORTHSTAR V1
     * ----------------------------------------------------------------
     * Pour avancer tout de suite, on utilise ici des données d'exemple.
     *
     * PLUS TARD :
     * remplace simplement getRawScanData() par ton vrai fetch / parser.
     ******************************************************************/

    function getRawScanData() {
      return [
        { ticker:"AMD",  price:193.68, gapPct:-6.58, session:"REG", volRel:2.30, floatPct:6.0, sector:"SEMI", news:true,  pmVolume:3200000, marketCap:"large", premarketHigh:198.5, premarketLow:191.8, last:193.68, compression:true, momentumAlive:true },
        { ticker:"PLTR", price:151.45, gapPct:15.25, session:"REG", volRel:2.10, floatPct:5.2, sector:"AI",   news:true,  pmVolume:4100000, marketCap:"large", premarketHigh:153.1, premarketLow:149.9, last:151.45, compression:true, momentumAlive:true },
        { ticker:"MRVL", price:87.52,  gapPct:11.33, session:"REG", volRel:1.80, floatPct:4.4, sector:"SEMI", news:true,  pmVolume:1400000, marketCap:"large", premarketHigh:88.6, premarketLow:86.4, last:87.52, compression:true, momentumAlive:true },
        { ticker:"TSLA", price:393.01, gapPct:-5.85, session:"REG", volRel:1.60, floatPct:3.1, sector:"EV",   news:false, pmVolume:2900000, marketCap:"mega",  premarketHigh:399.8, premarketLow:391.4, last:393.01, compression:false, momentumAlive:true },
        { ticker:"CVX",  price:196.83, gapPct:7.12,  session:"REG", volRel:1.55, floatPct:2.8, sector:"ENERGY",news:true, pmVolume:980000,  marketCap:"mega",  premarketHigh:197.7, premarketLow:195.9, last:196.83, compression:false, momentumAlive:true },
        { ticker:"AAPL", price:251.28, gapPct:-1.76, session:"REG", volRel:1.10, floatPct:0.9, sector:"TECH", news:false, pmVolume:800000,  marketCap:"mega",  premarketHigh:252.4, premarketLow:250.8, last:251.28, compression:false, momentumAlive:false }
      ];
    }

    // Contexte marché simple pour V1
    function getMarketContext() {
      // Plus tard, tu pourras le brancher à SPY / QQQ / VIX réels
      const spy = 0.42;
      const qqq = 0.67;
      const vix = -1.80;

      if (spy > 0 && qqq > 0 && vix <= 0) {
        return { dot:"🟢", className:"context-green", label:"favorable" };
      }
      if ((spy >= 0 && qqq < 0) || (spy < 0 && qqq >= 0) || vix > 0 && vix < 2) {
        return { dot:"🟡", className:"context-yellow", label:"mixte" };
      }
      return { dot:"🔴", className:"context-red", label:"risqué" };
    }

    function passesLiquidityFilter(row) {
      return (
        row.price >= 5 &&
        row.pmVolume >= 300000 &&
        row.volRel >= 1.2
      );
    }

    function isGapValid(row) {
      return Math.abs(row.gapPct) >= 3;
    }

    function hasInstitutionalVolume(row) {
      return row.volRel >= 2.0;
    }

    function hasStrongFloat(row) {
      return row.floatPct >= 3;
    }

    function gapHoldScore(row) {
      // V1 simplifiée :
      // on considère que si le titre reste dans la moitié haute de son range pré-market
      // et que le momentum est encore vivant, il "tient" suffisamment.
      const range = row.premarketHigh - row.premarketLow;
      if (range <= 0) return false;
      const pos = (row.last - row.premarketLow) / range;
      return pos >= 0.50;
    }

    function structureScore(row) {
      return !!row.compression;
    }

    function momentumScore(row) {
      return !!row.momentumAlive;
    }

    function computeScore(row) {
      let score = 0;

      if (isGapValid(row)) score += 1;            // Gap ≥ 3%
      if (row.volRel >= 1.5) score += 1;          // Volume relatif
      if (gapHoldScore(row)) score += 1;          // Tient le gap / tient le mouvement
      if (structureScore(row)) score += 1;        // Compression / structure propre
      if (momentumScore(row)) score += 1;         // Momentum vivant

      return Math.max(0, Math.min(5, score));
    }

    function greenDots(score) {
      return "🟢".repeat(score || 0);
    }

    function sectionName(score) {
      if (score >= 4) return "TOP";
      if (score === 3) return "WATCH";
      return "IGNORE";
    }

    function summarizeKing(row) {
      const pieces = [
        `Gap ${Math.abs(row.gapPct).toFixed(1)}%`,
        `Vol ${row.volRel.toFixed(1)}x`,
        `Float ${row.floatPct.toFixed(1)}%`,
        row.compression ? "Compression" : "Structure active"
      ];
      return pieces.join(" | ");
    }

    function assignSectorLeaders(rows) {
      const bestBySector = new Map();

      rows.forEach(row => {
        const power = computeScore(row) + Math.abs(row.gapPct) / 10 + row.volRel / 5;
        if (!bestBySector.has(row.sector) || power > bestBySector.get(row.sector).power) {
          bestBySector.set(row.sector, { ticker: row.ticker, power });
        }
      });

      return rows.map(row => ({
        ...row,
        isSectorLeader: bestBySector.get(row.sector)?.ticker === row.ticker
      }));
    }

    function rankRows(rows) {
      return rows.sort((a, b) => {
        const aScore = computeScore(a);
        const bScore = computeScore(b);

        if (bScore !== aScore) return bScore - aScore;
        if (hasInstitutionalVolume(b) !== hasInstitutionalVolume(a)) {
          return Number(hasInstitutionalVolume(b)) - Number(hasInstitutionalVolume(a));
        }
        return Math.abs(b.gapPct) - Math.abs(a.gapPct);
      });
    }

    function chooseKing(rows) {
      const eligible = rows.filter(r => computeScore(r) >= 4);
      if (!eligible.length) return null;
      return rankRows([...eligible])[0];
    }

    function rowFlags(row) {
      let flags = "";
      if (hasInstitutionalVolume(row)) flags += "💰";
      if (row.isSectorLeader) flags += (flags ? "  " : "") + "🏁";
      return flags;
    }

    function renderList(rows, tagClass, tagText) {
      if (!rows.length) return "";
      return `
        <div class="section-title">${tagText}</div>
        <div class="list">
          ${rows.map(row => `
            <div class="row">
              <div class="ticker">${row.ticker}</div>
              <div class="score">${greenDots(computeScore(row))}</div>
              <div class="flags">${rowFlags(row)}</div>
            </div>
          `).join("")}
        </div>
      `;
    }

    function renderOutput(rows) {
      const output = document.getElementById("output");
      const context = getMarketContext();

      const king = chooseKing(rows);
      const others = rows.filter(r => !king || r.ticker !== king.ticker);

      const topRows = others.filter(r => computeScore(r) >= 4);
      const watchRows = others.filter(r => computeScore(r) === 3);
      const ignoreRows = others.filter(r => computeScore(r) <= 2).slice(0, 3);

      output.innerHTML = `
        ${king ? `
          <div class="king-box">
            <div class="king-title">👑 KING OF THE DAY 👑</div>
            <div class="row">
              <div class="ticker">${king.ticker}</div>
              <div class="score">${greenDots(computeScore(king))}</div>
              <div class="flags">${rowFlags(king)}</div>
            </div>
            <div class="summary">${summarizeKing(king)}</div>
          </div>
        ` : `
          <div class="king-box">
            <div class="king-title">👑 KING OF THE DAY 👑</div>
            <div class="summary">Aucun vrai KING ce matin. Marché à surveiller avec prudence.</div>
          </div>
        `}

        ${renderList(topRows, "tag-top", "TOP CANDIDATS")}
        ${renderList(watchRows, "tag-watch", "WATCH")}
        ${renderList(ignoreRows, "tag-ignore", "IGNORE")}

        <div class="market-context">
          ──────────── Market <span class="${context.className}">${context.dot}</span> Context ────────────
        </div>

        <div class="footnote">
          Score = Gap ≥ 3% • VolRel ≥ 1.5x • Tenue du mouvement • Structure propre • Momentum vivant
        </div>
      `;
    }

    async function scanMarket() {
      const status = document.getElementById("status");
      status.textContent = "Scan en cours...";

      try {
        // ============================================================
        // ICI, plus tard, tu remplaces cette ligne par ton vrai fetch
        // ex:
        // const raw = await fetch('/api/scan').then(r => r.json());
        // ============================================================
        const raw = getRawScanData();

        let rows = raw
          .filter(passesLiquidityFilter)
          .map(row => ({
            ...row,
            score: computeScore(row)
          }));

        rows = assignSectorLeaders(rows);
        rows = rankRows(rows);

        renderOutput(rows);
        status.textContent = `Scan terminé : ${rows.length} titres filtrés.`;
      } catch (err) {
        console.error(err);
        status.textContent = "Erreur pendant le scan.";
        document.getElementById("output").innerHTML = `
          <div class="footnote" style="color:#fca5a5;">
            Impossible de générer le radar. Vérifie la source des données ou le code du scan.
          </div>
        `;
      }
    }

    // Affichage initial automatique
    scanMarket();
  </script>
</body>
</html>
