<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>🚀 NORTHSTAR PREMARKET RADAR</title>
  <style>
    :root{
      --bg:#0b1220;
      --panel:#121a2b;
      --text:#e7edf7;
      --muted:#95a3ba;
      --green:#22c55e;
      --yellow:#facc15;
      --red:#ef4444;
      --border:#24314a;
      --gold:#fbbf24;
      --line:#31415f;
    }

    *{box-sizing:border-box}

    body{
      margin:0;
      padding:18px 14px 28px;
      background:linear-gradient(180deg,#09111d 0%, #0b1220 100%);
      color:var(--text);
      font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text","Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    }

    .wrap{
      max-width:760px;
      margin:0 auto;
    }

    .card{
      background:rgba(18,26,43,.96);
      border:1px solid var(--border);
      border-radius:18px;
      padding:16px 14px 18px;
      box-shadow:0 10px 30px rgba(0,0,0,.28);
    }

    .title{
      text-align:center;
      font-weight:800;
      font-size:20px;
      letter-spacing:.3px;
      margin:2px 0 10px;
    }

    .divider{
      height:1px;
      background:linear-gradient(90deg,transparent, var(--line) 15%, var(--line) 85%, transparent);
      margin:8px 0 14px;
    }

    .actions{
      display:flex;
      gap:10px;
      justify-content:center;
      flex-wrap:wrap;
      margin-bottom:14px;
    }

    button{
      appearance:none;
      border:none;
      border-radius:12px;
      padding:12px 16px;
      font-size:15px;
      font-weight:800;
      color:#06101b;
      background:linear-gradient(180deg,#7dd3fc,#38bdf8);
      box-shadow:0 6px 16px rgba(56,189,248,.22);
      cursor:pointer;
    }

    button:disabled{
      opacity:.6;
      cursor:not-allowed;
    }

    .status{
      text-align:center;
      color:var(--muted);
      font-size:13px;
      min-height:18px;
      margin-bottom:10px;
      line-height:1.4;
    }

    .section-title{
      color:#cdd8ea;
      font-weight:800;
      font-size:14px;
      letter-spacing:.6px;
      margin:18px 0 10px;
      text-transform:uppercase;
    }

    .king-box{
      background:linear-gradient(180deg,rgba(251,191,36,.08),rgba(251,191,36,.03));
      border:1px solid rgba(251,191,36,.28);
      border-radius:16px;
      padding:12px;
      margin-bottom:18px;
    }

    .king-title{
      text-align:center;
      font-weight:900;
      color:var(--gold);
      margin-bottom:12px;
      font-size:16px;
    }

    .row{
      display:grid;
      grid-template-columns:84px 1fr auto auto;
      align-items:center;
      gap:10px;
      padding:10px 6px;
      border-radius:12px;
      background:rgba(255,255,255,.02);
      margin-bottom:12px;
    }

    .row:last-child{ margin-bottom:0; }

    .ticker{
      font-weight:900;
      font-size:17px;
      letter-spacing:.3px;
    }

    .score{
      font-size:18px;
      line-height:1;
      letter-spacing:1px;
      white-space:nowrap;
    }

    .flags, .action-signal{
      white-space:nowrap;
      font-size:18px;
      font-weight:800;
    }

    .summary{
      color:#d7e1f0;
      font-size:13px;
      line-height:1.6;
      margin-top:10px;
      text-align:center;
    }

    .list{
      display:flex;
      flex-direction:column;
      gap:8px;
    }

    .market-context{
      margin-top:20px;
      display:flex;
      align-items:center;
      justify-content:center;
      gap:10px;
      color:#d8e1ef;
      font-weight:800;
      font-size:15px;
      letter-spacing:.3px;
    }

    .market-context::before,
    .market-context::after{
      content:"";
      flex:1;
      height:1px;
      background:var(--line);
    }

    .context-green{ color:var(--green); }
    .context-yellow{ color:var(--yellow); }
    .context-red{ color:var(--red); }

    .footnote{
      margin-top:14px;
      color:var(--muted);
      font-size:12px;
      text-align:center;
      line-height:1.5;
    }

    .hint{
      margin-top:12px;
      color:var(--muted);
      font-size:12px;
      text-align:center;
    }

    @media (max-width:480px){
      .row{
        grid-template-columns:72px 1fr auto;
      }
      .action-signal{
        grid-column: 1 / -1;
        justify-self:end;
        font-size:16px;
        margin-top:-4px;
      }
      .ticker{font-size:16px}
      .score,.flags{font-size:17px}
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <div class="title">🚀 NORTHSTAR PREMARKET RADAR</div>
      <div class="divider"></div>

      <div class="actions">
        <button id="scanBtn" onclick="scanMarket()">SCAN MARKET</button>
      </div>

      <div id="status" class="status">Prêt pour le scan réel.</div>
      <div id="output"></div>
      <div class="hint">Universe liquide modifiable directement dans le script.</div>
    </div>
  </div>

  <script>
    // =============================
    // CONFIG
    // =============================
    const API_KEY = "TA_CLE_FMP_ICI";

    const UNIVERSE = [
      "AAPL","AMD","AMZN","AVGO","BABA","COIN","CVX","GOOGL","META","MRVL",
      "MU","NFLX","NVDA","PLTR","QCOM","SMCI","TSLA","UBER","XOM","JPM"
    ];

    // Contexte marché simple et robuste pour plan gratuit
    const MARKET_SYMBOLS = ["SPY","QQQ"];

    // Mapping secteur simple pour éviter des appels API de plus
    const SECTOR_MAP = {
      NVDA:"SEMI", AMD:"SEMI", AVGO:"SEMI", MRVL:"SEMI", MU:"SEMI", QCOM:"SEMI",
      TSLA:"EV", UBER:"TRANSPORT",
      XOM:"ENERGY", CVX:"ENERGY",
      META:"TECH", GOOGL:"TECH", AAPL:"TECH", AMZN:"TECH", NFLX:"TECH",
      PLTR:"AI", SMCI:"AI", COIN:"CRYPTO", JPM:"BANKS", BABA:"CHINA"
    };

    // =============================
    // HELPERS
    // =============================
    function fmt1(n){ return Number.isFinite(n) ? n.toFixed(1) : "—"; }
    function absPct(n){ return Number.isFinite(n) ? Math.abs(n) : 0; }

    function greenDots(score) {
      return "🟢".repeat(Math.max(0, Math.min(5, score)));
    }

    function delay(ms){
      return new Promise(resolve => setTimeout(resolve, ms));
    }

    async function fetchJson(url){
      const res = await fetch(url);
      if (!res.ok) {
        throw new Error(`HTTP ${res.status} sur ${url}`);
      }
      return res.json();
    }

    // =============================
    // API
    // =============================
    async function fetchQuote(symbol){
      const url = `https://financialmodelingprep.com/stable/quote?symbol=${encodeURIComponent(symbol)}&apikey=${API_KEY}`;
      const data = await fetchJson(url);
      return Array.isArray(data) ? data[0] : null;
    }

    async function fetchAllQuotes(symbols){
      const out = [];
      for (const symbol of symbols) {
        try {
          const q = await fetchQuote(symbol);
          if (q) out.push(q);
        } catch (err) {
          console.warn("Erreur quote", symbol, err);
        }
        await delay(120);
      }
      return out;
    }

    // =============================
    // NORMALIZATION
    // =============================
    function normalizeQuote(raw){
      if (!raw) return null;

      return {
        symbol: raw.symbol || "",
        price: Number(raw.price ?? NaN),
        previousClose: Number(raw.previousClose ?? NaN),
        changePct: Number(raw.changesPercentage ?? raw.changePercentage ?? raw.changePercent ?? 0),
        volume: Number(raw.volume ?? 0),
        dayLow: Number(raw.dayLow ?? NaN),
        dayHigh: Number(raw.dayHigh ?? NaN),
        open: Number(raw.open ?? NaN)
      };
    }

    // =============================
    // SCORING LOGIC
    // =============================
    function computeGapPct(row){
      if (Number.isFinite(row.changePct)) return row.changePct;
      if (Number.isFinite(row.price) && Number.isFinite(row.previousClose) && row.previousClose !== 0) {
        return ((row.price - row.previousClose) / row.previousClose) * 100;
      }
      return 0;
    }

    function computeVolRel(row){
      // Proxy simple et robuste pour la version gratuite
      // À ajuster plus tard si on ajoute une vraie moyenne historique
      if (!Number.isFinite(row.volume)) return 0;

      if (row.volume >= 20000000) return 3.0;
      if (row.volume >= 10000000) return 2.5;
      if (row.volume >= 5000000)  return 2.0;
      if (row.volume >= 2000000)  return 1.6;
      if (row.volume >= 800000)   return 1.3;
      return 0.8;
    }

    function computeFloatPct(row){
      // Proxy visuel pour ne pas casser le plan gratuit
      // basé sur volume actuel
      if (!Number.isFinite(row.volume) || row.volume <= 0) return 0;
      if (row.volume >= 20000000) return 8.0;
      if (row.volume >= 10000000) return 5.5;
      if (row.volume >= 5000000)  return 3.8;
      if (row.volume >= 2000000)  return 2.4;
      if (row.volume >= 800000)   return 1.4;
      return 0.6;
    }

    function computeHold(row){
      if (!Number.isFinite(row.price) || !Number.isFinite(row.dayLow) || !Number.isFinite(row.dayHigh)) return false;
      const range = row.dayHigh - row.dayLow;
      if (range <= 0) return false;
      const pos = (row.price - row.dayLow) / range;
      return pos >= 0.50;
    }

    function computeCompression(row){
      if (!Number.isFinite(row.dayLow) || !Number.isFinite(row.dayHigh) || !Number.isFinite(row.price)) return false;
      const rangePct = ((row.dayHigh - row.dayLow) / row.price) * 100;
      return rangePct <= 2.0;
    }

    function computeMomentumAlive(gapPct, volRel){
      return absPct(gapPct) >= 2 && volRel >= 1.3;
    }

    function hasInstitutionalVolume(volRel, hold, compression){
      return volRel >= 2.0 && hold && (compression || volRel >= 2.5);
    }

    function computeActionSignal(score, volRel, hold, momentumAlive){
      if (score >= 4 && volRel >= 1.5 && hold && momentumAlive) return "🟢GO";
      if (score >= 3) return "🟡WAIT";
      return "🔴STOP";
    }

    function computeScore({ gapPct, volRel, hold, compression, momentumAlive }){
      let score = 0;
      if (absPct(gapPct) >= 3) score += 1;
      if (volRel >= 1.5) score += 1;
      if (hold) score += 1;
      if (compression) score += 1;
      if (momentumAlive) score += 1;
      return Math.max(0, Math.min(5, score));
    }

    function passesLiquidityFilter(row){
      return row.price >= 5 && row.volume >= 300000;
    }

    function enrichRow(row){
      const gapPct = computeGapPct(row);
      const volRel = computeVolRel(row);
      const floatPct = computeFloatPct(row);
      const hold = computeHold(row);
      const compression = computeCompression(row);
      const momentumAlive = computeMomentumAlive(gapPct, volRel);
      const score = computeScore({ gapPct, volRel, hold, compression, momentumAlive });
      const actionSignal = computeActionSignal(score, volRel, hold, momentumAlive);
      const institutional = hasInstitutionalVolume(volRel, hold, compression);

      return {
        ...row,
        gapPct,
        volRel,
        floatPct,
        hold,
        compression,
        momentumAlive,
        score,
        actionSignal,
        institutional,
        sector: SECTOR_MAP[row.symbol] || "GENERAL"
      };
    }

    function assignSectorLeaders(rows){
      const bestBySector = new Map();

      for (const row of rows) {
        const power =
          row.score * 10 +
          row.volRel * 3 +
          absPct(row.gapPct) +
          (row.institutional ? 3 : 0);

        if (!bestBySector.has(row.sector) || power > bestBySector.get(row.sector).power) {
          bestBySector.set(row.sector, { symbol: row.symbol, power });
        }
      }

      return rows.map(row => ({
        ...row,
        isSectorLeader: bestBySector.get(row.sector)?.symbol === row.symbol
      }));
    }

    function chooseMarketContext(spyRow, qqqRow){
      const spy = Number(spyRow?.gapPct ?? 0);
      const qqq = Number(qqqRow?.gapPct ?? 0);

      if (spy > 0 && qqq > 0) {
        return { dot:"🟢", className:"context-green" };
      }
      if ((spy >= 0 && qqq < 0) || (spy < 0 && qqq >= 0) || (Math.abs(spy) < 0.3 && Math.abs(qqq) < 0.3)) {
        return { dot:"🟡", className:"context-yellow" };
      }
      return { dot:"🔴", className:"context-red" };
    }

    function chooseKing(rows){
      const eligible = rows.filter(r => r.score >= 4);

      if (!eligible.length) return null;

      return [...eligible].sort((a, b) => {
        const scoreA =
          a.score * 10 +
          a.volRel * 3 +
          absPct(a.gapPct) +
          (a.institutional ? 4 : 0) +
          (a.isSectorLeader ? 3 : 0) +
          (a.hold ? 2 : 0);

        const scoreB =
          b.score * 10 +
          b.volRel * 3 +
          absPct(b.gapPct) +
          (b.institutional ? 4 : 0) +
          (b.isSectorLeader ? 3 : 0) +
          (b.hold ? 2 : 0);

        return scoreB - scoreA;
      })[0];
    }

    // =============================
    // RENDER
    // =============================
    function flagsForRow(row){
      const flags = [];
      if (row.institutional) flags.push("💰");
      if (row.isSectorLeader) flags.push("🏁");
      return flags.join("  ");
    }

    function summarizeRow(row){
      const parts = [
        `Gap ${fmt1(absPct(row.gapPct))}%`,
        `Vol ${fmt1(row.volRel)}x`,
        `Float ${fmt1(row.floatPct)}%`,
        row.compression ? "Compression" : "Structure active"
      ];
      return parts.join(" | ");
    }

    function renderRows(rows){
      return rows.map(row => `
        <div class="row">
          <div class="ticker">${row.symbol}</div>
          <div class="score">${greenDots(row.score)}</div>
          <div class="flags">${flagsForRow(row)}</div>
          <div class="action-signal">${row.actionSignal}</div>
        </div>
      `).join("");
    }

    function renderOutput(rows, context){
      const output = document.getElementById("output");

      const king = chooseKing(rows);
      const rest = rows.filter(r => !king || r.symbol !== king.symbol);

      const topRows = rest.filter(r => r.score >= 4);
      const watchRows = rest.filter(r => r.score === 3);
      const ignoreRows = rest.filter(r => r.score <= 2).slice(0, 3);

      output.innerHTML = `
        ${
          king
            ? `
              <div class="king-box">
                <div class="king-title">👑 KING OF THE DAY 👑</div>
                <div class="row">
                  <div class="ticker">${king.symbol}</div>
                  <div class="score">${greenDots(king.score)}</div>
                  <div class="flags">${flagsForRow(king)}</div>
                  <div class="action-signal">${king.actionSignal}</div>
                </div>
                <div class="summary">${summarizeRow(king)}</div>
              </div>
            `
            : `
              <div class="king-box">
                <div class="king-title">👑 KING OF THE DAY 👑</div>
                <div class="summary">Aucun vrai KING ce matin. Marché à surveiller avec prudence.</div>
              </div>
            `
        }

        ${topRows.length ? `<div class="section-title">TOP CANDIDATS</div><div class="list">${renderRows(topRows)}</div>` : ""}
        ${watchRows.length ? `<div class="section-title">WATCH</div><div class="list">${renderRows(watchRows)}</div>` : ""}
        ${ignoreRows.length ? `<div class="section-title">IGNORE</div><div class="list">${renderRows(ignoreRows)}</div>` : ""}

        <div class="market-context">
          <span>Market <span class="${context.className}">${context.dot}</span> Context</span>
        </div>

        <div class="footnote">
          Score = Gap ≥ 3% • VolRel ≥ 1.5x • Tenue du mouvement • Structure propre • Momentum vivant
        </div>
      `;
    }

    // =============================
    // MAIN
    // =============================
    async function scanMarket(){
      const btn = document.getElementById("scanBtn");
      const status = document.getElementById("status");
      const output = document.getElementById("output");

      btn.disabled = true;
      status.textContent = "Scan réel en cours...";
      output.innerHTML = "";

      try {
        if (!API_KEY || API_KEY.includes("u1ujNxMOWm5fGfePMeOdrn3teLy8fzNW")) {
          throw new Error("Ajoute d’abord ta clé API FMP dans la constante API_KEY.");
        }

        const [marketRaw, rawQuotes] = await Promise.all([
          fetchAllQuotes(MARKET_SYMBOLS),
          fetchAllQuotes(UNIVERSE)
        ]);

        const marketRows = marketRaw.map(normalizeQuote).filter(Boolean).map(enrichRow);
        let rows = rawQuotes.map(normalizeQuote).filter(Boolean).map(enrichRow);

        rows = rows.filter(passesLiquidityFilter);
        rows = assignSectorLeaders(rows);

        rows.sort((a, b) => {
          const powerA =
            a.score * 10 +
            a.volRel * 3 +
            absPct(a.gapPct) +
            (a.institutional ? 4 : 0) +
            (a.isSectorLeader ? 3 : 0);

          const powerB =
            b.score * 10 +
            b.volRel * 3 +
            absPct(b.gapPct) +
            (b.institutional ? 4 : 0) +
            (b.isSectorLeader ? 3 : 0);

          return powerB - powerA;
        });

        const spyRow = marketRows.find(r => r.symbol === "SPY");
        const qqqRow = marketRows.find(r => r.symbol === "QQQ");
        const context = chooseMarketContext(spyRow, qqqRow);

        renderOutput(rows, context);
        status.textContent = `Scan terminé : ${rows.length} titres retenus.`;
      } catch (err) {
        console.error(err);
        status.textContent = "Erreur pendant le scan.";
        output.innerHTML = `
          <div class="footnote" style="color:#fca5a5;">
            ${String(err.message || err)}
          </div>
        `;
      } finally {
        btn.disabled = false;
      }
    }

    scanMarket();
  </script>
</body>
</html>
