<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>🚀 NORTHSTAR PREMARKET RADAR</title>
  <style>
    :root{
      --bg:#0b1220;
      --panel:#121a2b;
      --text:#e7edf7;
      --muted:#95a3ba;
      --green:#22c55e;
      --yellow:#facc15;
      --red:#ef4444;
      --border:#24314a;
      --gold:#fbbf24;
      --line:#31415f;
    }

    *{box-sizing:border-box}

    body{
      margin:0;
      padding:18px 14px 28px;
      background:linear-gradient(180deg,#09111d 0%, #0b1220 100%);
      color:var(--text);
      font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text","Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    }

    .wrap{
      max-width:760px;
      margin:0 auto;
    }

    .card{
      background:rgba(18,26,43,.96);
      border:1px solid var(--border);
      border-radius:18px;
      padding:16px 14px 18px;
      box-shadow:0 10px 30px rgba(0,0,0,.28);
    }

    .title{
      text-align:center;
      font-weight:800;
      font-size:20px;
      letter-spacing:.3px;
      margin:2px 0 10px;
    }

    .divider{
      height:1px;
      background:linear-gradient(90deg,transparent, var(--line) 15%, var(--line) 85%, transparent);
      margin:8px 0 14px;
    }

    .actions{
      display:flex;
      gap:10px;
      justify-content:center;
      flex-wrap:wrap;
      margin-bottom:14px;
    }

    button{
      appearance:none;
      border:none;
      border-radius:12px;
      padding:12px 16px;
      font-size:15px;
      font-weight:800;
      color:#06101b;
      background:linear-gradient(180deg,#7dd3fc,#38bdf8);
      box-shadow:0 6px 16px rgba(56,189,248,.22);
      cursor:pointer;
    }

    button:disabled{
      opacity:.6;
      cursor:not-allowed;
    }

    .status{
      text-align:center;
      color:var(--muted);
      font-size:13px;
      min-height:18px;
      margin-bottom:10px;
      line-height:1.4;
    }

    .section-title{
      color:#cdd8ea;
      font-weight:800;
      font-size:14px;
      letter-spacing:.6px;
      margin:18px 0 10px;
      text-transform:uppercase;
    }

    .king-box{
      background:linear-gradient(180deg,rgba(251,191,36,.08),rgba(251,191,36,.03));
      border:1px solid rgba(251,191,36,.28);
      border-radius:16px;
      padding:12px;
      margin-bottom:18px;
    }

    .king-title{
      text-align:center;
      font-weight:900;
      color:var(--gold);
      margin-bottom:12px;
      font-size:16px;
    }

    .row{
      display:grid;
      grid-template-columns:84px 1fr auto auto;
      align-items:center;
      gap:10px;
      padding:10px 6px;
      border-radius:12px;
      background:rgba(255,255,255,.02);
      margin-bottom:12px;
    }

    .row:last-child{ margin-bottom:0; }

    .ticker{
      font-weight:900;
      font-size:17px;
      letter-spacing:.3px;
    }

    .score{
      font-size:18px;
      line-height:1;
      letter-spacing:1px;
      white-space:nowrap;
    }

    .flags, .action-signal{
      white-space:nowrap;
      font-size:18px;
      font-weight:800;
    }

    .summary{
      color:#d7e1f0;
      font-size:13px;
      line-height:1.6;
      margin-top:10px;
      text-align:center;
    }

    .list{
      display:flex;
      flex-direction:column;
      gap:8px;
    }

    .market-context{
      margin-top:20px;
      display:flex;
      align-items:center;
      justify-content:center;
      gap:10px;
      color:#d8e1ef;
      font-weight:800;
      font-size:15px;
      letter-spacing:.3px;
    }

    .market-context::before,
    .market-context::after{
      content:"";
      flex:1;
      height:1px;
      background:var(--line);
    }

    .context-green{ color:var(--green); }
    .context-yellow{ color:var(--yellow); }
    .context-red{ color:var(--red); }

    .footnote{
      margin-top:14px;
      color:var(--muted);
      font-size:12px;
      text-align:center;
      line-height:1.5;
    }

    .hint{
      margin-top:12px;
      color:var(--muted);
      font-size:12px;
      text-align:center;
    }

    @media (max-width:480px){
      .row{
        grid-template-columns:72px 1fr auto;
      }
      .action-signal{
        grid-column: 1 / -1;
        justify-self:end;
        font-size:16px;
        margin-top:-4px;
      }
      .ticker{font-size:16px}
      .score,.flags{font-size:17px}
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <div class="title">🚀 NORTHSTAR PREMARKET RADAR</div>
      <div class="divider"></div>

      <div class="actions">
        <button id="scanBtn" onclick="scanMarket()">SCAN MARKET</button>
      </div>

      <div id="status" class="status">Prêt pour le scan réel.</div>
      <div id="output"></div>
      <div class="hint">Universe liquide modifiable directement dans le script.</div>
    </div>
  </div>

  <script>
    // =============================
    // CONFIG
    // =============================
const API_KEY = "3f8b29c1d4e0a123456";

    // Universe compact pour iPhone + limite API raisonnable.
    // Tu peux en ajouter ou en retirer.
    const UNIVERSE = [
      "AAPL","AMD","AMZN","AVGO","BABA","COIN","CVX","GOOGL","META","MRVL",
      "MU","NFLX","NVDA","PLTR","QCOM","SMCI","TSLA","UBER","XOM","JPM"
    ];

    const MARKET_SYMBOLS = ["SPY","QQQ","^VIX"];

    // =============================
    // HELPERS
    // =============================
    const fmt1 = (n) => Number.isFinite(n) ? n.toFixed(1) : "—";
    const fmt2 = (n) => Number.isFinite(n) ? n.toFixed(2) : "—";
    const absPct = (n) => Number.isFinite(n) ? Math.abs(n) : 0;

    function greenDots(score) {
      return "🟢".repeat(Math.max(0, Math.min(5, score)));
    }

    function safeArray(value) {
      return Array.isArray(value) ? value : [];
    }

    function delay(ms) {
      return new Promise(resolve => setTimeout(resolve, ms));
    }

    async function fetchJson(url) {
      const res = await fetch(url, { method: "GET" });
      if (!res.ok) {
        throw new Error(`HTTP ${res.status} sur ${url}`);
      }
      return res.json();
    }

    function chunk(arr, size) {
      const out = [];
      for (let i = 0; i < arr.length; i += size) {
        out.push(arr.slice(i, i + size));
      }
      return out;
    }

    // =============================
    // FMP ENDPOINTS
    // =============================
    async function fetchBatchQuotes(symbols) {
      const groups = chunk(symbols, 5);
      const results = [];

      // Séquentiel pour rester gentil avec les limites API
      for (const group of groups) {
        const joined = group.join(",");
        const url = `https://financialmodelingprep.com/stable/batch-quote?symbols=${encodeURIComponent(joined)}&apikey=${API_KEY}`;
        const data = await fetchJson(url);
        results.push(...safeArray(data));
        await delay(150);
      }

      return results;
    }

    async function fetchShareFloat(symbol) {
      const url = `https://financialmodelingprep.com/stable/shares-float?symbol=${encodeURIComponent(symbol)}&apikey=${API_KEY}`;
      const data = await fetchJson(url);
      return safeArray(data)[0] || null;
    }

    async function fetchIntraday5m(symbol) {
      const url = `https://financialmodelingprep.com/stable/historical-chart/5min?symbol=${encodeURIComponent(symbol)}&apikey=${API_KEY}`;
      const data = await fetchJson(url);
      return safeArray(data);
    }

    async function fetchStockNews(symbol, limit = 5) {
      const url = `https://financialmodelingprep.com/stable/news/stock?symbols=${encodeURIComponent(symbol)}&limit=${limit}&apikey=${API_KEY}`;
      const data = await fetchJson(url);
      return safeArray(data);
    }

    // =============================
    // DATA NORMALIZATION
    // =============================
    function normalizeQuote(raw) {
      // FMP batch quote fields can vary slightly by endpoint version.
      const symbol = raw.symbol || raw.ticker || raw.code;
      const price = Number(raw.price ?? raw.lastPrice ?? raw.previousClose ?? NaN);
      const previousClose = Number(raw.previousClose ?? raw.prevClose ?? NaN);
      const volume = Number(raw.volume ?? raw.dayVolume ?? 0);
      const changePct = Number(raw.changesPercentage ?? raw.changePercentage ?? 0);

      return {
        symbol,
        price,
        previousClose,
        volume,
        changePct,
        name: raw.name || symbol,
        exchange: raw.exchange || "",
        marketCap: Number(raw.marketCap ?? 0),
        dayLow: Number(raw.dayLow ?? NaN),
        dayHigh: Number(raw.dayHigh ?? NaN)
      };
    }

    function latestBarsToday(bars) {
      // Assume descending most-recent-first if API returns that way; sort to be safe.
      const sorted = [...bars].sort((a, b) => new Date(a.date) - new Date(b.date));
      return sorted.slice(-24); // recent window only
    }

    function computeCompression(bars) {
      if (bars.length < 4) return false;

      const recent = bars.slice(-4);
      const highs = recent.map(b => Number(b.high));
      const lows = recent.map(b => Number(b.low));
      const closes = recent.map(b => Number(b.close));

      const range = Math.max(...highs) - Math.min(...lows);
      const avgClose = closes.reduce((a,b)=>a+b,0) / closes.length || 1;

      // structure "calme" et range relativement serré
      return (range / avgClose) <= 0.0125;
    }

    function computeMomentumAlive(bars) {
      if (bars.length < 3) return false;

      const recent = bars.slice(-3);
      const first = Number(recent[0].close);
      const last = Number(recent[recent.length - 1].close);
      const vol = recent.reduce((acc, b) => acc + Number(b.volume || 0), 0);

      return last >= first * 0.995 && vol > 0;
    }

    function computePremarketRangeHold(bars, currentPrice) {
      if (bars.length < 3 || !Number.isFinite(currentPrice)) return false;

      const highs = bars.map(b => Number(b.high));
      const lows = bars.map(b => Number(b.low));
      const hi = Math.max(...highs);
      const lo = Math.min(...lows);
      const range = hi - lo;

      if (!Number.isFinite(range) || range <= 0) return false;

      const pos = (currentPrice - lo) / range;
      return pos >= 0.50;
    }

    function guessOpenReady(score, volRel, hold, compression, momentumAlive) {
      if (score >= 4 && volRel >= 1.5 && hold && momentumAlive) {
        return "🟢GO";
      }
      if (score >= 3 && (compression || hold)) {
        return "🟡WAIT";
      }
      return "🔴STOP";
    }

    function actionRank(signal) {
      if (signal === "🟢GO") return 3;
      if (signal === "🟡WAIT") return 2;
      return 1;
    }

    // =============================
    // SCORING
    // =============================
    function computeVolRel(dayVolume, bars) {
      // Proxy navigateur:
      // compare le volume actuel au volume moyen récent des 5-min bars.
      if (!bars.length || !dayVolume) return 0;

      const recentBars = bars.slice(-12); // ~1h récente
      const avg5m = recentBars.reduce((a,b)=>a + Number(b.volume || 0), 0) / Math.max(recentBars.length, 1);
      if (!avg5m) return 0;

      // Approximation volontaire pour usage mobile
      const projected = avg5m * 12;
      return projected > 0 ? dayVolume / projected : 0;
    }

    function computeFloatPct(volume, floatShares) {
      if (!floatShares || !volume) return 0;
      return (volume / floatShares) * 100;
    }

    function hasInstitutionalVolume(volRel, floatPct, hold, compression) {
      return volRel >= 2.0 && hold && (compression || floatPct >= 2);
    }

    function computeScore({ gapPct, volRel, hold, compression, momentumAlive }) {
      let score = 0;

      if (absPct(gapPct) >= 3) score += 1;
      if (volRel >= 1.5) score += 1;
      if (hold) score += 1;
      if (compression) score += 1;
      if (momentumAlive) score += 1;

      return Math.max(0, Math.min(5, score));
    }

    function passesLiquidityFilter(row) {
      return (
        row.price >= 5 &&
        row.volume >= 300000 &&
        row.volRel >= 1.2
      );
    }

    function sectionName(score) {
      if (score >= 4) return "TOP";
      if (score === 3) return "WATCH";
      return "IGNORE";
    }

    function summarizeRow(row) {
      const parts = [
        `Gap ${fmt1(absPct(row.gapPct))}%`,
        `Vol ${fmt1(row.volRel)}x`,
        `Float ${fmt1(row.floatPct)}%`,
        row.compression ? "Compression" : "Structure active"
      ];
      return parts.join(" | ");
    }

    function chooseMarketContext(spyQuote, qqqQuote, vixQuote) {
      const spy = Number(spyQuote?.changePct ?? 0);
      const qqq = Number(qqqQuote?.changePct ?? 0);
      const vix = Number(vixQuote?.changePct ?? 0);

      if (spy > 0 && qqq > 0 && vix <= 0) {
        return { dot: "🟢", className: "context-green", label: "favorable" };
      }
      if ((spy >= 0 && qqq < 0) || (spy < 0 && qqq >= 0) || (vix > 0 && vix < 2)) {
        return { dot: "🟡", className: "context-yellow", label: "mixte" };
      }
      return { dot: "🔴", className: "context-red", label: "risqué" };
    }

    function pickSectorLeaders(rows) {
      const best = new Map();

      for (const row of rows) {
        const leaderPower =
          row.score * 10 +
          row.volRel * 2 +
          absPct(row.gapPct) +
          (row.institutional ? 3 : 0) +
          actionRank(row.actionSignal);

        if (!best.has(row.sector) || leaderPower > best.get(row.sector).power) {
          best.set(row.sector, { symbol: row.symbol, power: leaderPower });
        }
      }

      return rows.map(row => ({
        ...row,
        isSectorLeader: best.get(row.sector)?.symbol === row.symbol
      }));
    }

    function chooseKing(rows) {
      const eligible = rows.filter(r => r.score >= 4);

      if (!eligible.length) return null;

      const ranked = [...eligible].sort((a, b) => {
        const kingA =
          a.score * 10 +
          a.volRel * 3 +
          absPct(a.gapPct) +
          (a.institutional ? 4 : 0) +
          (a.isSectorLeader ? 3 : 0) +
          actionRank(a.actionSignal) * 3 +
          (a.hold ? 2 : 0);

        const kingB =
          b.score * 10 +
          b.volRel * 3 +
          absPct(b.gapPct) +
          (b.institutional ? 4 : 0) +
          (b.isSectorLeader ? 3 : 0) +
          actionRank(b.actionSignal) * 3 +
          (b.hold ? 2 : 0);

        return kingB - kingA;
      });

      return ranked[0];
    }

    // =============================
    // RENDER
    // =============================
    function flagsForRow(row) {
      const flags = [];
      if (row.institutional) flags.push("💰");
      if (row.isSectorLeader) flags.push("🏁");
      return flags.join("  ");
    }

    function renderRows(rows) {
      return rows.map(row => `
        <div class="row">
          <div class="ticker">${row.symbol}</div>
          <div class="score">${greenDots(row.score)}</div>
          <div class="flags">${flagsForRow(row)}</div>
          <div class="action-signal">${row.actionSignal}</div>
        </div>
      `).join("");
    }

    function renderOutput(rows, context) {
      const output = document.getElementById("output");
      const king = chooseKing(rows);
      const rest = rows.filter(r => !king || r.symbol !== king.symbol);

      const topRows = rest.filter(r => r.score >= 4);
      const watchRows = rest.filter(r => r.score === 3);
      const ignoreRows = rest.filter(r => r.score <= 2).slice(0, 3);

      output.innerHTML = `
        ${
          king
            ? `
              <div class="king-box">
                <div class="king-title">👑 KING OF THE DAY 👑</div>
                <div class="row">
                  <div class="ticker">${king.symbol}</div>
                  <div class="score">${greenDots(king.score)}</div>
                  <div class="flags">${flagsForRow(king)}</div>
                  <div class="action-signal">${king.actionSignal}</div>
                </div>
                <div class="summary">${summarizeRow(king)}</div>
              </div>
            `
            : `
              <div class="king-box">
                <div class="king-title">👑 KING OF THE DAY 👑</div>
                <div class="summary">Aucun vrai KING ce matin. Marché à surveiller avec prudence.</div>
              </div>
            `
        }

        ${topRows.length ? `<div class="section-title">TOP CANDIDATS</div><div class="list">${renderRows(topRows)}</div>` : ""}
        ${watchRows.length ? `<div class="section-title">WATCH</div><div class="list">${renderRows(watchRows)}</div>` : ""}
        ${ignoreRows.length ? `<div class="section-title">IGNORE</div><div class="list">${renderRows(ignoreRows)}</div>` : ""}

        <div class="market-context">
          <span>Market <span class="${context.className}">${context.dot}</span> Context</span>
        </div>

        <div class="footnote">
          Score = Gap ≥ 3% • VolRel ≥ 1.5x • Tenue du mouvement • Structure propre • Momentum vivant
        </div>
      `;
    }

    // =============================
    // MAIN SCAN
    // =============================
    async function buildSymbolRecord(symbol, quoteMap, marketNewsEnabled = true) {
      const quote = quoteMap.get(symbol);
      if (!quote) return null;

      const [floatRaw, barsRaw, newsRaw] = await Promise.all([
        fetchShareFloat(symbol).catch(() => null),
        fetchIntraday5m(symbol).catch(() => []),
        marketNewsEnabled ? fetchStockNews(symbol, 3).catch(() => []) : Promise.resolve([])
      ]);

      const bars = latestBarsToday(barsRaw);

      const floatShares = Number(
        floatRaw?.floatShares ??
        floatRaw?.freeFloat ??
        floatRaw?.sharesFloat ??
        0
      );

      const volRel = computeVolRel(quote.volume, bars);
      const floatPct = computeFloatPct(quote.volume, floatShares);
      const hold = computePremarketRangeHold(bars, quote.price);
      const compression = computeCompression(bars);
      const momentumAlive = computeMomentumAlive(bars);
      const score = computeScore({
        gapPct: quote.changePct,
        volRel,
        hold,
        compression,
        momentumAlive
      });

      const actionSignal = guessOpenReady(score, volRel, hold, compression, momentumAlive);
      const institutional = hasInstitutionalVolume(volRel, floatPct, hold, compression);

      return {
        symbol: quote.symbol,
        price: quote.price,
        gapPct: quote.changePct,
        volume: quote.volume,
        previousClose: quote.previousClose,
        volRel,
        floatPct,
        floatShares,
        hold,
        compression,
        momentumAlive,
        score,
        actionSignal,
        institutional,
        sector: inferSector(symbol, newsRaw),
        hasNews: safeArray(newsRaw).length > 0
      };
    }

    function inferSector(symbol, newsItems) {
      // Version légère pour rester robuste côté browser.
      // On garde quelques regroupements utiles.
      const map = {
        NVDA: "SEMI", AMD: "SEMI", AVGO: "SEMI", MRVL: "SEMI", MU: "SEMI", QCOM: "SEMI",
        TSLA: "EV", UBER: "TRANSPORT",
        XOM: "ENERGY", CVX: "ENERGY",
        META: "TECH", GOOGL: "TECH", AAPL: "TECH", AMZN: "TECH", NFLX: "TECH",
        PLTR: "AI", SMCI: "AI", COIN: "CRYPTO", JPM: "BANKS", BABA: "CHINA"
      };

      if (map[symbol]) return map[symbol];

      const text = safeArray(newsItems).map(n => `${n.title || ""} ${n.text || ""}`.toUpperCase()).join(" ");
      if (text.includes("SEMICONDUCTOR") || text.includes("CHIP")) return "SEMI";
      if (text.includes("OIL") || text.includes("ENERGY")) return "ENERGY";
      if (text.includes("BANK")) return "BANKS";
      return "GENERAL";
    }

    async function scanMarket() {
      const btn = document.getElementById("scanBtn");
      const status = document.getElementById("status");
      const output = document.getElementById("output");

      btn.disabled = true;
      status.textContent = "Scan réel en cours...";
      output.innerHTML = "";

      try {
        if (!API_KEY || API_KEY.includes("TON_API_KEY")) {
          throw new Error("Ajoute d’abord ta clé API FMP dans la constante API_KEY.");
        }

        // 1) Quotes universe + market context
        const [rawQuotes, rawMarketQuotes] = await Promise.all([
          fetchBatchQuotes(UNIVERSE),
          fetchBatchQuotes(MARKET_SYMBOLS)
        ]);

        const quoteMap = new Map(
          rawQuotes
            .map(normalizeQuote)
            .filter(q => q.symbol)
            .map(q => [q.symbol, q])
        );

        const marketMap = new Map(
          rawMarketQuotes
            .map(normalizeQuote)
            .filter(q => q.symbol)
            .map(q => [q.symbol, q])
        );

        const context = chooseMarketContext(
          marketMap.get("SPY"),
          marketMap.get("QQQ"),
          marketMap.get("^VIX")
        );

        // 2) Enrich each symbol
        const records = [];
        for (const symbol of UNIVERSE) {
          try {
            const rec = await buildSymbolRecord(symbol, quoteMap, true);
            if (rec) records.push(rec);
            await delay(120);
          } catch (e) {
            console.warn("Erreur symbole", symbol, e);
          }
        }

        // 3) Filter + sector leaders + sort
        let rows = records.filter(passesLiquidityFilter);
        rows = pickSectorLeaders(rows);

        rows.sort((a, b) => {
          const rankA =
            a.score * 10 +
            (a.institutional ? 4 : 0) +
            (a.isSectorLeader ? 3 : 0) +
            actionRank(a.actionSignal) * 3 +
            a.volRel +
            absPct(a.gapPct);

          const rankB =
            b.score * 10 +
            (b.institutional ? 4 : 0) +
            (b.isSectorLeader ? 3 : 0) +
            actionRank(b.actionSignal) * 3 +
            b.volRel +
            absPct(b.gapPct);

          return rankB - rankA;
        });

        renderOutput(rows, context);
        status.textContent = `Scan terminé : ${rows.length} titres retenus.`;
      } catch (err) {
        console.error(err);
        status.textContent = "Erreur pendant le scan.";
        output.innerHTML = `
          <div class="footnote" style="color:#fca5a5;">
            ${String(err.message || err)}
          </div>
        `;
      } finally {
        btn.disabled = false;
      }
    }

    // Auto-run
    scanMarket();
  </script>
</body>
</html>
