<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>NorthStar PreMarket</title>

<style>
body{
background:#0f1115;
color:white;
font-family:Arial;
text-align:center;
padding:20px;
}

h1{
color:#3dd6ff;
margin-bottom:8px;
}

#summary{
margin:10px 0 18px 0;
font-size:16px;
}

button{
background:#3dd6ff;
border:none;
padding:14px 20px;
font-size:18px;
border-radius:8px;
margin:10px;
cursor:pointer;
}

table{
margin:auto;
margin-top:20px;
border-collapse:collapse;
width:auto;
}

td,th{
padding:8px 14px;
border-bottom:1px solid #333;
}

.green{color:#00ff9c}
.red{color:#ff5a5a}
.gray{color:#bbbbbb}
.yellow{color:#ffd166}

.hot{
font-weight:bold;
color:#00ff9c;
}

.watch{
font-weight:bold;
color:#ffd166;
}

.ignore{
color:#bbbbbb;
}

@media (max-width: 700px){
  body{
    padding:12px;
  }

  h1{
    font-size:24px;
  }

  td,th{
    padding:6px 8px;
    font-size:14px;
  }

  button{
    font-size:16px;
    padding:12px 16px;
  }

  #summary{
    font-size:14px;
  }
}
</style>
</head>

<body>

<h1>NorthStar PreMarket</h1>

<div id="summary">Clique sur SCAN MARKET</div>

<button onclick="scan()">SCAN MARKET</button>

<table id="table">
<tr>
<th>Ticker</th>
<th>Prix</th>
<th>Gap %</th>
<th>Session</th>
<th>Force</th>
<th>Vol Rel</th>
<th>Vol Force</th>
<th>Radar</th>
</tr>
</table>

<script>
const tickers = [
"NVDA","TSLA","AMD","PLTR","SMCI",
"MU","MRVL","AVGO","AAPL","XOM","CVX"
]

function getForce(absGap){
  if(absGap >= 5) return "EXPLOSIF"
  if(absGap >= 3) return "FORT"
  if(absGap >= 1.5) return "ACTIF"
  return "FAIBLE"
}

function getVolForce(volRel){
  if(volRel >= 5) return "EXPLOSIF"
  if(volRel >= 3) return "FORT"
  if(volRel >= 1.5) return "ACTIF"
  return "FAIBLE"
}

function avg(arr){
  const clean = arr.filter(v => v != null && !isNaN(v) && v > 0)
  if(clean.length === 0) return 0
  return clean.reduce((a,b) => a + b, 0) / clean.length
}

function getRadar(absGap, volRel){
  if(absGap >= 3 && volRel >= 1.5) return "HOT"
  if(absGap >= 2 || volRel >= 1.2) return "WATCH"
  return "IGNORE"
}

function radarRank(radar){
  if(radar === "HOT") return 3
  if(radar === "WATCH") return 2
  return 1
}

async function scan(){
  let results = []

  const requests = tickers.map(async (t) => {
    try{
      let url = `https://autumn-dream-7e4e.lavpierre.workers.dev/?symbol=${t}&range=1mo&interval=1d`

      let r = await fetch(url)
      let data = await r.json()

      if(!data.chart || !data.chart.result || !data.chart.result[0]) return

      let result = data.chart.result[0]
      let meta = result.meta || {}
      let quote = result.indicators && result.indicators.quote ? result.indicators.quote[0] : null
      if(!quote) return

      let previous = meta.chartPreviousClose
      if(!previous) previous = meta.previousClose
      if(previous == null || previous === 0) return

      let price = null
      let session = "REG"

      if(meta.preMarketPrice != null && meta.preMarketPrice > 0){
        price = meta.preMarketPrice
        session = "PRE"
      }else if(meta.postMarketPrice != null && meta.postMarketPrice > 0){
        price = meta.postMarketPrice
        session = "POST"
      }else if(meta.regularMarketPrice != null){
        price = meta.regularMarketPrice
        session = "REG"
      }

      if(price == null) return

      let gap = ((price - previous) / previous) * 100
      let absGap = Math.abs(gap)

      let volumes = quote.volume || []
      let todayVolume = volumes.length ? volumes[volumes.length - 1] : 0
      let pastVolumes = volumes.slice(Math.max(0, volumes.length - 11), volumes.length - 1)
      let avgVolume = avg(pastVolumes)

      let volRel = 0
      if(avgVolume > 0 && todayVolume > 0){
        volRel = todayVolume / avgVolume
      }

      let radar = getRadar(absGap, volRel)

      results.push({
        ticker: t,
        price: price,
        gap: gap,
        session: session,
        force: getForce(absGap),
        volRel: volRel,
        volForce: getVolForce(volRel),
        radar: radar
      })

    }catch(e){
      console.log("Erreur sur", t, e)
    }
  })

  await Promise.all(requests)

  results.sort((a,b) => {
    const radarDiff = radarRank(b.radar) - radarRank(a.radar)
    if(radarDiff !== 0) return radarDiff
    return Math.abs(b.gap) - Math.abs(a.gap)
  })

  let hotCount = results.filter(r => r.radar === "HOT").length
  let watchCount = results.filter(r => r.radar === "WATCH").length
  let ignoreCount = results.filter(r => r.radar === "IGNORE").length

  document.getElementById("summary").innerHTML =
    `<span class="hot">HOT: ${hotCount}</span> | ` +
    `<span class="watch">WATCH: ${watchCount}</span> | ` +
    `<span class="ignore">IGNORE: ${ignoreCount}</span>`

  let table = document.getElementById("table")

  table.innerHTML = `
    <tr>
      <th>Ticker</th>
      <th>Prix</th>
      <th>Gap %</th>
      <th>Session</th>
      <th>Force</th>
      <th>Vol Rel</th>
      <th>Vol Force</th>
      <th>Radar</th>
    </tr>
  `

  for(let r of results){
    let gapColor = r.gap >= 0 ? "green" : "red"
    let sessionColor = r.session === "PRE" ? "green" : (r.session === "POST" ? "red" : "gray")
    let volColor = r.volRel >= 1.5 ? "green" : "gray"

    let radarClass = "ignore"
    if(r.radar === "HOT") radarClass = "hot"
    if(r.radar === "WATCH") radarClass = "watch"

    table.innerHTML += `
      <tr>
        <td>${r.ticker}</td>
        <td>${r.price.toFixed(2)}</td>
        <td class="${gapColor}">${r.gap.toFixed(2)}%</td>
        <td class="${sessionColor}">${r.session}</td>
        <td>${r.force}</td>
        <td class="${volColor}">${r.volRel.toFixed(2)}x</td>
        <td>${r.volForce}</td>
        <td class="${radarClass}">${r.radar}</td>
      </tr>
    `
  }
}
</script>

</body>
</html>
